<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Model GRID — BEEP BEEP · מרכז שליטה</title>
  <style>
    :root {
      --font-scale: 1;
      --bg: #0a0f14;
      --panel: #121c28;
      --panel-border: #3d5a80;
      --text: #ffffff;
      --text-muted: #c8d8e8;
      --gold: #ffd700;
      --profit: #00e676;
      --loss: #ff5252;
      --btc: #ff9f00;
      --buy: #4fc3f7;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; margin:0; overflow:hidden;
      background:var(--bg); color:var(--text);
      font-family:'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: calc(16px * var(--font-scale));
      line-height: 1.35;
    }
    html { height:100dvh; }
    body { min-height:0; max-height:100dvh; }
    body.text-xl { --font-scale: 1.15; }
    body.text-xxl { --font-scale: 1.28; }

    @media (prefers-reduced-motion: reduce) {
      .sb-dot, .bc-dot, .dl { animation: none !important; }
    }

    /* ── HEADER (legacy — hidden) ── */
    .header {
      grid-column: 1 / -1;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
      padding:10px 16px;
      background:#080f18; border-bottom:2px solid var(--panel-border);
    }
    .header-brand { min-width:200px; }
    .header-title { font-size: calc(1.35rem * var(--font-scale)); font-weight:800; color:var(--gold); letter-spacing:.5px; }
    .header-tagline { font-size: calc(.85rem * var(--font-scale)); color:var(--text-muted); margin-top:4px; font-weight:600; }
    .header-hero { display:flex; gap:20px; align-items:center; flex-wrap:wrap; justify-content:center; flex:1; }
    .hero-stat { text-align:center; min-width:100px; padding:6px 12px; border-radius:10px; border:2px solid var(--panel-border); background:var(--panel); }
    .hero-stat.btc-box { border-color:var(--btc); background:#1a1200; }
    .hero-val { font-size: calc(1.65rem * var(--font-scale)); font-weight:800; line-height:1.1; }
    .hero-lbl { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:700; margin-top:4px; }
    .btc-now { font-size: calc(2rem * var(--font-scale)); font-weight:800; color:var(--btc); }
    .ref-txt { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); text-align:center; margin-top:4px; font-weight:600; }
    .hdr-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .status-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 12px; border-radius:24px;
      font-size: calc(.8rem * var(--font-scale)); font-weight:800; letter-spacing:.5px;
      margin-top:6px; border:2px solid;
    }
    .sb-sim  { background:#0a2540; border-color:#4fc3f7; color:#4fc3f7; }
    .sb-live { background:#003318; border-color:var(--profit); color:var(--profit); }
    .sb-dot  { width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 2s infinite; }
    .hdr-btn {
      background:var(--panel); border:2px solid var(--panel-border); border-radius:8px;
      color:var(--gold); font-size: calc(.85rem * var(--font-scale)); font-weight:700;
      padding:10px 14px; min-height:44px; cursor:pointer; white-space:nowrap;
    }
    .hdr-btn:hover, .hdr-btn:focus { border-color:var(--gold); outline:3px solid #ffd70044; }
    .font-btn { min-width:44px; font-size:1.1rem; padding:8px; }

    /* ── BOTS BAR ── */
    .bots-bar {
      grid-column:1/-1;
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:10px; padding:10px 16px;
      background:#060c14; border-bottom:2px solid var(--panel-border);
    }
    .bot-card {
      background:var(--panel); border:2px solid var(--panel-border); border-radius:10px;
      padding:10px 12px; min-height:76px; cursor:pointer;
      display:flex; align-items:center; gap:10px;
    }
    .bot-card:hover { border-color:var(--gold); }
    .bot-card.active { border-color:var(--gold); border-width:3px; background:#1a2838; box-shadow:0 0 12px #ffd70033; }
    .bc-dot  { width:10px;height:10px;border-radius:50%;background:var(--profit);flex-shrink:0;animation:pulse 2s infinite; }
    .bc-icon { font-size:1.5rem; flex-shrink:0; }
    .bc-r    { flex:1; min-width:0; }
    .bc-name { font-size: calc(1rem * var(--font-scale)); font-weight:800; color:var(--gold); }
    .bc-row  { display:flex; gap:8px; margin-top:6px; align-items:center; flex-wrap:wrap; }
    .bc-pnl  { font-size: calc(1.2rem * var(--font-scale)); font-weight:800; }
    .bc-wl   { font-size: calc(.9rem * var(--font-scale)); font-weight:700; }
    .bc-lbl  { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:700; margin-right:auto; }
    .bc-badge { font-size: calc(.7rem * var(--font-scale)); padding:3px 8px; border-radius:8px; font-weight:800; border:1px solid; }
    .bc-badge-sim  { background:#0a2540; border-color:#4fc3f7; color:#4fc3f7; }
    .bc-badge-live { background:#003318; border-color:var(--profit); color:var(--profit); }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

    /* ── LEFT STATS ── */
    .left {
      grid-column:1; grid-row:3;
      padding:10px 12px;
      display:flex; flex-direction:column; gap:10px; overflow-y:auto;
      border-left:2px solid var(--panel-border);
    }
    .green{color:var(--profit);} .red{color:var(--loss);} .blue{color:var(--gold);} .orange{color:var(--btc);}

    .stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat-card {
      background:var(--panel); border:2px solid var(--panel-border); border-radius:10px;
      padding:12px; text-align:center;
    }
    .stat-card.wide { grid-column:1 / -1; }
    .stat-val { font-size: calc(1.45rem * var(--font-scale)); font-weight:800; }
    .stat-sub { font-size: calc(.85rem * var(--font-scale)); color:var(--gold); font-weight:700; margin-top:4px; }
    .stat-lbl { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:700; margin-top:6px; }

    .grid-viz { background:var(--panel); border:2px solid var(--panel-border); border-radius:10px; padding:12px; }
    .vt  { font-size: calc(.9rem * var(--font-scale)); color:var(--text); font-weight:800; margin-bottom:8px; }
    .rl  { display:flex; justify-content:space-between; font-size: calc(.85rem * var(--font-scale)); font-weight:700; margin-bottom:6px; }
    .rb  { position:relative; height:24px; background:#0a1520; border-radius:12px; border:2px solid var(--panel-border); margin-bottom:10px; }
    .rf  { height:100%; background:linear-gradient(90deg,#004a6a,#0088cc); border-radius:10px 0 0 10px; }
    .pp  { position:absolute; top:-6px; width:4px; height:36px; background:var(--btc); border-radius:2px; transform:translateX(-50%); box-shadow:0 0 10px #ff9f0088; }
    .pl  { position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size: calc(.85rem * var(--font-scale)); color:var(--btc); white-space:nowrap; font-weight:800; }
    .gm4 { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .gm  { background:#0a1520; border-radius:8px; padding:8px; text-align:center; border:2px solid var(--panel-border); }
    .gmv { font-size: calc(1.1rem * var(--font-scale)); font-weight:800; color:var(--gold); }
    .gml { font-size: calc(.75rem * var(--font-scale)); color:var(--text-muted); font-weight:700; margin-top:4px; }

    .profit-curve { background:var(--panel); border:2px solid var(--panel-border); border-radius:10px; padding:12px; }
    .pc-title { font-size: calc(.9rem * var(--font-scale)); font-weight:800; margin-bottom:8px; display:flex; justify-content:space-between; }
    #profit-canvas { width:100%; height:72px; display:block; }

    .mdd-main { text-align:center; padding:8px; background:#0a1520; border-radius:8px; border:2px solid var(--panel-border); margin-top:8px; }
    .mdd-main-val { font-size: calc(1.3rem * var(--font-scale)); font-weight:800; }
    .mdd-mini { display:flex; justify-content:space-around; margin-top:8px; font-size: calc(.75rem * var(--font-scale)); color:var(--text-muted); font-weight:600; }

    /* ── CENTER — CHART ── */
    .center {
      grid-column:2; grid-row:3;
      display:flex; flex-direction:column;
      border-left:2px solid var(--panel-border);
      overflow:hidden;
    }
    .chart-header {
      padding:10px 14px;
      font-size: calc(.9rem * var(--font-scale)); font-weight:800;
      border-bottom:2px solid var(--panel-border); flex-shrink:0;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
      background:var(--panel);
    }
    .chart-info { display:flex; gap:14px; align-items:center; font-size: calc(.85rem * var(--font-scale)); font-weight:700; flex-wrap:wrap; }
    .ci-item { display:flex; gap:6px; align-items:center; }
    .ci-dot  { width:12px;height:12px;border-radius:50%; }
    .chart-wrap {
      flex:1; overflow:hidden; position:relative;
      border:2px solid #ffd70033; margin:8px; border-radius:10px;
    }
    #tv-chart   { width:100%; height:100%; }
    #grid-overlay { position:absolute; inset:0; pointer-events:none; z-index:10; }

    /* ── BOTTOM PANEL (tabs) ── */
    .bottom-panel {
      grid-column:1 / -1; grid-row:4;
      display:flex; flex-direction:column;
      background:#060c14; border-top:2px solid var(--panel-border);
      min-height:200px; max-height:32vh;
    }
    .tab-bar { display:flex; gap:8px; padding:8px 12px; border-bottom:2px solid var(--panel-border); flex-wrap:wrap; }
    .tab-btn {
      font-size: calc(.95rem * var(--font-scale)); font-weight:800;
      padding:10px 18px; min-height:44px; border-radius:8px; cursor:pointer;
      background:var(--panel); border:2px solid var(--panel-border); color:var(--text);
    }
    .tab-btn.active { border-color:var(--gold); color:var(--gold); background:#1a2838; }
    .tab-btn:focus { outline:3px solid #ffd70055; }
    .tab-body { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:8px 12px; }
    .tab-pane { display:none; flex:1; overflow:hidden; flex-direction:column; }
    .tab-pane.active { display:flex; }
    .levels-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
    .levels-toolbar .leg { display:flex; gap:12px; font-size: calc(.85rem * var(--font-scale)); font-weight:700; }
    .leg span { display:flex; align-items:center; gap:6px; }
    .dg { width:10px;height:10px;border-radius:50%; }
    .ls { flex:1; overflow-y:auto; }
    .glv-row { padding:8px 10px; border-bottom:2px solid #09151f; min-height:44px; }
    .glv-row:hover { background:#0a1520; }
    .glv-top { display:flex; justify-content:space-between; align-items:center; font-size: calc(.95rem * var(--font-scale)); font-weight:700; gap:8px; flex-wrap:wrap; }
    .glv-num { color:var(--text-muted); font-weight:800; min-width:28px; }
    .glv-buy  { color:var(--buy); font-weight:800; }
    .glv-sell { color:var(--text); font-weight:700; }
    .glv-prof { color:var(--profit); font-weight:800; }
    .glv-bar-wrap { height:6px; background:#0a1520; border-radius:3px; margin-top:6px; }
    .glv-filled  { background:#003318; }
    .glv-current { background:#332200; }

    .log-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .log-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
    .ft { font-size: calc(.95rem * var(--font-scale)); font-weight:800; }
    .log-filter { display:flex; gap:8px; }
    .lf-btn {
      font-size: calc(.9rem * var(--font-scale)); font-weight:700;
      padding:8px 14px; min-height:44px; border-radius:8px; cursor:pointer;
      background:var(--panel); border:2px solid var(--panel-border); color:var(--text);
    }
    .lf-btn.act { border-color:var(--gold); color:var(--gold); background:#1a2838; }
    .fscr { flex:1; overflow-y:auto; }
    .log-entry { display:flex; align-items:center; gap:10px; padding:10px 8px; min-height:48px; border-bottom:2px solid #09151f; font-size: calc(.9rem * var(--font-scale)); }
    .log-icon { font-size:1.2rem; }
    .log-title { font-weight:800; }
    .log-sub { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:600; margin-top:2px; }
    .log-profit { font-size: calc(1rem * var(--font-scale)); font-weight:800; color:var(--profit); }
    .log-time { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:600; }
    .log-table { width:100%; border-collapse:collapse; font-size: calc(.9rem * var(--font-scale)); }
    .log-table th { padding:8px; text-align:right; color:var(--text-muted); font-weight:800; border-bottom:2px solid var(--panel-border); }
    .log-table td { padding:10px 8px; border-bottom:1px solid #09151f; font-weight:700; }
    .log-table tr.sell-row { background:#003318; }

    .tiles-panel { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .tiles-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
    .tiles-toolbar-title { font-size: calc(.95rem * var(--font-scale)); font-weight:800; }
    .hist-btn { font-size: calc(.85rem * var(--font-scale)); font-weight:700; padding:8px 14px; min-height:44px; background:var(--panel); border:2px solid var(--gold); border-radius:8px; color:var(--gold); cursor:pointer; }
    #tiles-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; }

    /* ── STATUS ── */
    .status {
      grid-column:1/-1; grid-row:5;
      background:#050b12; border-top:2px solid var(--panel-border);
      padding:8px 16px;
      display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
      font-size: calc(.85rem * var(--font-scale)); font-weight:700; color:var(--text-muted);
    }
    .dl { width:8px;height:8px;background:var(--profit);border-radius:50%;display:inline-block;margin-left:6px;animation:pulse 2s infinite; }

    /* ══ MODALS ══ */
    .modal-overlay {
      position:fixed; inset:0; background:#00000088; z-index:1000;
      display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(3px);
    }
    .modal-overlay.hidden { display:none; }
    .modal-box {
      background:var(--panel); border:2px solid var(--gold); border-radius:12px;
      padding:24px; min-width:400px; max-width:560px; width:92vw;
      box-shadow:0 8px 32px #00000080; position:relative;
    }
    .modal-title { font-size: calc(1.2rem * var(--font-scale)); font-weight:800; color:var(--gold); margin-bottom:8px; }
    .modal-sub { font-size: calc(.9rem * var(--font-scale)); color:var(--text-muted); margin-bottom:16px; font-weight:600; }
    .modal-close {
      position:absolute; top:12px; left:12px;
      background:none; border:none; color:#ffffff; font-size:1.1rem;
      cursor:pointer; line-height:1; padding:2px 6px;
    }
    .modal-close:hover { color:#ff5252; }

    /* Settings modal */
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .sg-item { background:#0a1520; border:1px solid #0f2030; border-radius:7px; padding:8px 10px; }
    .sg-label { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:700; margin-bottom:4px; }
    .sg-val   { font-size: calc(1.1rem * var(--font-scale)); font-weight:800; color:var(--gold); }
    .sg-sub   { font-size: calc(.75rem * var(--font-scale)); color:var(--text-muted); margin-top:4px; }
    .modal-note { background:#071520; border:2px solid var(--panel-border); border-radius:8px; padding:12px; font-size: calc(.85rem * var(--font-scale)); font-weight:600; }

    /* Calculator modal */
    .calc-form { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
    .cf-row { display:flex; flex-direction:column; gap:3px; }
    .cf-label { font-size: calc(.85rem * var(--font-scale)); font-weight:700; color:var(--text-muted); }
    .cf-input {
      background:#0a1520; border:2px solid var(--panel-border); border-radius:8px;
      color:var(--text); font-size: calc(1rem * var(--font-scale)); padding:12px 14px; min-height:48px; outline:none;
    }
    .cf-input:focus { border-color:var(--gold); outline:3px solid #ffd70044; }
    .calc-btn {
      background:#003a5a; border:2px solid #4fc3f7; border-radius:8px;
      color:var(--gold); font-size: calc(1rem * var(--font-scale)); font-weight:800;
      padding:14px; min-height:48px; cursor:pointer; width:100%;
    }
    .calc-btn:hover { background:#004a6a; }
    .calc-results { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .cr-item { background:#0a1520; border:1px solid #0f2030; border-radius:7px; padding:8px 10px; text-align:center; }
    .cr-val { font-size: calc(1.15rem * var(--font-scale)); font-weight:800; color:var(--profit); }
    .cr-lbl { font-size: calc(.8rem * var(--font-scale)); color:var(--text-muted); font-weight:700; margin-top:4px; }

    /* Wizard modal */
    .wiz-steps { display:flex; gap:6px; margin-bottom:18px; }
    .wiz-step {
      flex:1; text-align:center; padding:6px 4px;
      border-radius:7px; font-size:.6rem;
      background:#0a1520; border:1px solid #0f2030; color:#ffffff;
      transition:all .2s; cursor:pointer;
    }
    .wiz-step.active { background:#002535; border-color:#005a8a; color:#ffd700; font-weight:700; }
    .wiz-step.done   { background:#002510; border-color:#005a30; color:#00a050; }
    .wiz-num  { font-size:.8rem; font-weight:700; display:block; margin-bottom:2px; }
    .wiz-lbl  { font-size:.54rem; }
    .wiz-content { background:#0a1520; border:1px solid #0f2030; border-radius:8px; padding:14px; margin-bottom:14px; min-height:130px; }
    .wiz-title { font-size:.82rem; font-weight:700; color:#ffd700; margin-bottom:6px; }
    .wiz-desc  { font-size:.66rem; color:#ffffff; line-height:1.6; }
    .wiz-field { margin-top:10px; }
    .wiz-nav { display:flex; gap:8px; justify-content:flex-start; }
    .wiz-btn {
      background:#0a2030; border:1px solid #005a8a; border-radius:7px;
      color:#ffd700; font-size:.68rem; font-weight:700; padding:6px 16px;
      cursor:pointer; transition:all .2s;
    }
    .wiz-btn:hover { background:#003a50; }
    .wiz-btn.primary { background:#003a5a; }
    .wiz-btn.gray    { background:#0a1520; border-color:#152535; color:#ffffff; }

    ::-webkit-scrollbar{width:10px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:5px}

    /* ══ LIVE TILES ══ */
    .tile {
      flex-shrink:0; width:96px; min-height:88px; border-radius:10px; padding:8px 10px;
      background:var(--panel); border:3px solid var(--btc);
      text-align:center; cursor:default;
    }
    .tile.waiting  { border-color:#f7931a; }
    .tile.bought   { border-color:#00e676; }
    .tile.loss     { border-color:#ff4444; }
    .tile.sold-win { border-color:#00e676; background:#001a0e; }
    .tile.sold-los { border-color:#ff4444; background:#1a0000; }
    .tile-lbl  { font-size: calc(.75rem * var(--font-scale)); color:var(--text); font-weight:700; margin-bottom:4px; }
    .tile-price{ font-size: calc(.95rem * var(--font-scale)); font-weight:800; color:var(--text); }
    .tile-pct  { font-size: calc(.85rem * var(--font-scale)); font-weight:800; margin-top:4px; }
    .tile-sub  { font-size: calc(.75rem * var(--font-scale)); color:var(--text-muted); font-weight:600; margin-top:4px; }
    .tile-pair { display:flex; gap:3px; }
    .tile-arrow{ display:flex;align-items:center;color:#555;font-size:.8rem;}

    /* History calendar */
    .hist-day {
      font-size: calc(.8rem * var(--font-scale)); font-weight:700;
      padding:6px 10px; border-radius:6px; cursor:pointer;
      background:var(--panel); border:2px solid var(--panel-border); color:var(--text-muted);
    }
    .toggle-levels-btn {
      font-size: calc(.85rem * var(--font-scale)); font-weight:700;
      padding:8px 14px; min-height:44px; border-radius:8px; cursor:pointer;
      background:#0a2540; border:2px solid #4fc3f7; color:#4fc3f7;
    }
    .num-ltr { direction:ltr; unicode-bidi:embed; display:inline-block; }
    .hist-day:hover { border-color:#ffd700; color:#ffd700; }
    .hist-day.active { border-color:#ffd700; color:#ffd700; background:#0d1e30; }

    /* ══════════════════════════════════════════════════════════
       MODEL GRID — Winner UI v3 (Senior-friendly terminal)
       ══════════════════════════════════════════════════════════ */
    .root {
      display:grid;
      width:100%;
      height:100%;
      max-height:100dvh;
      min-height:0;
      grid-template-rows:auto auto minmax(0,1fr) minmax(88px,min(22dvh,240px)) auto;
      grid-template-columns:minmax(220px,28vw) minmax(0,1fr);
      background:linear-gradient(165deg,#0b1220 0%,#070d14 45%,#0a1018 100%);
    }
    .mg-cmd {

function buildVerdict(btc, lower, upper, inPct, pnl, filled, grids){

  return {cls, headline, inRange, profitOk,
    lines:[

}
function buildOverviewHtml(btc, p, s, tradeLog, pnl, apr, cycles, filled, grids, inPct, lower, upper, unrealPnl, totalPnl){

function applyFontScale(){
  const idx=parseInt(localStorage.getItem('mgFontIdx')||'0',10);

}
function adjustFont(delta){
  let idx=parseInt(localStorage.getItem('mgFontIdx')||'0',10);
  idx=Math.max(0,Math.min(2,idx+delta));
  localStorage.setItem('mgFontIdx',String(idx));

function toggleAllLevels(){

function buildLevelRows(s,btc,grids,upper,lower){
  if(!s||!s.grid) return '';
  let indices=[];
  if(showAllLevels||!btc){
    indices=s.grid.map((_,i)=>i);
  }else{
    let ci=s.grid.findIndex(lv=>btc>=lv.buy&&btc<lv.sell);
    if(ci<0) ci=s.grid.reduce((best,lv,i)=>Math.abs(lv.buy-btc)<Math.abs(s.grid[best].buy-btc)?i:best,0);
    const from=Math.max(0,ci-5), to=Math.min(s.grid.length-1,ci+5);
    for(let i=from;i<=to;i++) indices.push(i);
  }
  return [...indices].reverse().map(i=>{
    const lv=s.grid[i], idx=i+1;
    const isFilled=lv.filled;
    const isHere=!lv.filled&&btc>=lv.buy&&btc<lv.sell;
    let rowCls='glv-row ';
    const barPct=upper>lower?((lv.sell-lv.buy)/(upper-lower)*100)*grids*0.6:30;
    const barW=Math.max(15,Math.min(100,barPct));
    if(isFilled) rowCls+='glv-filled';
    else if(isHere) rowCls+='glv-current';
    const badge=isFilled?'✅ קנוי':isHere?'◉ כאן':'○ ממתין';
    return `<div class="${rowCls}">
      <div class="glv-top">
        <span class="glv-num">#${idx}</span>
        <span class="glv-buy"><span class="num-ltr">$${fmt(lv.buy,0)}</span></span>
        <span class="glv-sell">→ <span class="num-ltr">$${fmt(lv.sell,0)}</span></span>
        <span class="glv-prof">+<span class="num-ltr">$${fmt(lv.profit,4)}</span></span>
        <span style="font-weight:800">${badge}</span>
      </div>
      <div class="glv-bar-wrap"><div class="glv-bar-fill" style="width:${barW}%;background:${isFilled?'#00e676':isHere?'#ff9f00':'#3d5a80'};height:100%;border-radius:3px;"></div></div>
    </div>`;
  }).join('');
}

const fmt =(n,d=2)=>n==null||isNaN(n)?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD=iso=>{if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('he-IL')+' '+d.toTimeString().slice(0,5);};
const fmtT=iso=>{if(!iso)return'—';const d=new Date(iso);return d.toTimeString().slice(0,5);};
const dayS=iso=>Math.max(0.001,(Date.now()-new Date(iso).getTime())/86400000);

function parseSummary(bot,raw){
  if(!raw) return null;
  try{
    if(bot.type==='grid') return{pnl:raw.realized_pnl||0,wins:raw.total_cycles||0,losses:0,total:raw.total_cycles||0,winRate:100,apr:raw.apr||0,balance:(raw.investment||0)+(raw.realized_pnl||0),label:`APR ${fmt(raw.apr||0,1)}%`,updated:raw.last_updated};
    if(bot.type==='bit'||bot.type==='smc'){const s=raw.stats||{};return{pnl:raw.total_pnl||0,wins:s.wins||0,losses:s.losses||0,total:s.total||0,winRate:s.win_rate||0,apr:0,balance:(raw.available||0)+(raw.in_trades||0),label:`${fmt(s.win_rate||0,0)}% Win`,updated:raw.last_updated};}
    if(bot.type==='w'){const a=Array.isArray(raw)?raw:[];const wins=a.filter(t=>t.result==='win').length;const losses=a.filter(t=>t.result==='loss').length;const pnl=a.reduce((s,t)=>s+(t.pnl_usd||0),0);return{pnl,wins,losses,total:a.length,winRate:a.length>0?wins/a.length*100:0,apr:0,balance:1000+pnl,label:`${fmt(a.length>0?wins/a.length*100:0,0)}% Win`,updated:a.length>0?a[a.length-1].close_time:null};}
  }catch(e){return null;}
  return null;
}

async function fetchBot(bot){
  try{
    const r=await fetch(bot.pUrl+'?t='+Date.now());
    const raw=await r.json();
    botData[bot.id]={raw,summary:parseSummary(bot,raw)};
    if(bot.sUrl){const r2=await fetch(bot.sUrl+'?t='+Date.now());botData[bot.id].state=r2.ok?await r2.json():null;}
  }catch(e){botData[bot.id]={raw:null,summary:null,state:null};}
}

async function load(){
  const[btcRes]=await Promise.all([fetch(BTC_URL),...BOTS.map(b=>fetchBot(b))]);
  const btc=parseFloat((await btcRes.json()).price||0);
  render(btc);
}

function render(btc){

  const gD=botData['grid'],p=gD?.raw||{},s=gD?.state||null;
  const inv=p.investment||0,pnl=p.realized_pnl||0,total=inv+pnl;
  const apr=p.apr||0,cycles=p.total_cycles||0,dgt=p.dgt_count||0,mdd=p.max_drawdown||0;
  const d=p.start_time?dayS(p.start_time):0.8;
  const lower=s?s.lower:0,upper=s?s.upper:0,grids=s?s.grids:0,atr=s?s.atr14:0;
  const filled=s?s.grid.filter(l=>l.filled).length:0,waiting=grids-filled;
  const inPct=upper>lower&&btc>0?Math.max(0,Math.min(100,(btc-lower)/(upper-lower)*100)):0;
  const mid=s&&s.grid?s.grid[Math.floor(grids/2)]:null;
  const ppc=mid?mid.profit:0,perG=grids>0?inv/grids:0,dcyc=d>0?cycles/d:0;
  const pc=pnl>=0?'green':'red',ac=apr>=0?'green':'red';
  const tradeLog=p.trade_log||[];

  // ── Pionex-style calculations ─────────────────────────────────
  // Unrealized P&L: estimate based on filled levels vs current price
  const filledLevels = s&&s.grid ? s.grid.filter(l=>l.filled) : [];
  const btcHolding   = filledLevels.reduce((sum,l)=>sum+(l.qty||0), 0);
  const usdtHolding  = inv - filledLevels.length*(perG||0);
  const avgBuyPrice  = btcHolding>0 ? filledLevels.reduce((sum,l)=>sum+(l.buy*(l.qty||0)),0)/btcHolding : (btc||0);
  const unrealPnl    = btcHolding>0&&btc>0 ? (btc - avgBuyPrice)*btcHolding : 0;
  const totalPnl     = pnl + unrealPnl;
  const totalApr     = d>0 ? (totalPnl/inv)/d*365*100 : 0;

  // Runtime string

  const rDays  = Math.floor(totalSec/86400);

// ── Profit Curve (Pionex-style stepped chart) ──────────────────
function drawProfitCurve(tradeLog, totalPnl) {
  const canvas = document.getElementById('profit-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 200;
  const H = canvas.offsetHeight || 48;
  canvas.width  = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  // Build stepped profit array from sell trades
  const sells = tradeLog.filter(t => t.type === 'SELL').slice(-60);
  if (sells.length === 0) {
    ctx.fillStyle = '#c8d8e8';
    ctx.font = 'bold 14px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ממתין לעסקאות...', W/2, H/2);
    return;
  }

  let running = 0;
  const pts = sells.map(t => { running += (t.profit||0); return running; });
  pts.unshift(0);

  const minV = Math.min(...pts), maxV = Math.max(...pts);
  const range = maxV - minV || 1;
  const toY = v => H - 6 - ((v - minV) / range) * (H - 12);
  const toX = i => (i / (pts.length - 1)) * W;

  // Fill area
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(0,230,118,0.3)');
  grad.addColorStop(1, 'rgba(0,230,118,0.02)');
  ctx.beginPath();
  ctx.moveTo(toX(0), H);
  pts.forEach((v, i) => {
    if (i > 0) ctx.lineTo(toX(i-1), toY(pts[i-1])); // stepped
    ctx.lineTo(toX(i), toY(v));
  });
  ctx.lineTo(toX(pts.length-1), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Stepped line
  ctx.beginPath();
  ctx.strokeStyle = '#00e676';
  ctx.lineWidth = 1.5;
  pts.forEach((v, i) => {
    if (i === 0) { ctx.moveTo(toX(i), toY(v)); return; }
    ctx.lineTo(toX(i-1), toY(pts[i-1]));
    ctx.lineTo(toX(i), toY(v));
  });
  ctx.stroke();

  // Final value label
  ctx.fillStyle = '#00e676';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`+$${totalPnl.toFixed(2)}`, 4, 10);
}

// ── Live Tiles Panel ────────────────────────────────────────────
let historyMode = false;
let historyDate = null;

function buildLiveTiles(s, btc, tradeLog) {
  if (!s || !s.grid) return '';
  const today = new Date().toDateString();

  // עסקאות של היום
  const todaySells = (tradeLog||[]).filter(t => {
    if(t.type !== 'SELL') return false;
    return new Date(t.time).toDateString() === today;
  });
  const todayBuys = (tradeLog||[]).filter(t => {
    if(t.type !== 'BUY') return false;
    return new Date(t.time).toDateString() === today;
  });

  let html = '';

  // 1. עסקאות שהסתיימו היום (נמכרו)
  todaySells.forEach(sell => {
    const profit = sell.profit || 0;
    const isWin = profit >= 0;
    const pct = sell.qty > 0 ? (profit / (sell.price * sell.qty) * 100) : 0;
    html += `<div class="tile ${isWin?'sold-win':'sold-los'}">
      <div class="tile-lbl" style="color:#fff">${isWin?'✅ רווח':'❌ הפסד'}</div>
      <div class="tile-price" style="color:#fff">$${fmt(sell.price,0)}</div>
      <div class="tile-pct" style="color:#fff">${isWin?'+':''}${fmt(pct,2)}%</div>
      <div class="tile-sub" style="color:#fff">+$${fmt(profit,4)}</div>
    </div>`;
  });

  // 2. פוזיציות פתוחות — זוג בחלונית משותפת עם קו אפור
  const filledLevels = s.grid.filter(l => l.filled);
  filledLevels.forEach(lv => {
    const unrealPct = btc > 0 ? ((btc - lv.buy) / lv.buy * 100) : 0;
    const isProfit = unrealPct >= 0;
    html += `<div class="tile-pair-wrap">
      <!-- ריבוע קנייה — ירוק כמו קודם -->
      <div class="tile bought" style="margin:0;">
        <div class="tile-lbl" style="color:#fff">✅ קנוי</div>
        <div class="tile-price" style="color:#fff">$${fmt(lv.buy,0)}</div>
        <div class="tile-pct" style="color:#fff">${isProfit?'+':''}${fmt(unrealPct,2)}%</div>
        <div class="tile-sub" style="color:#fff">צף</div>
      </div>
      <!-- חץ -->
      <div style="color:#555;font-size:.8rem;">›</div>
      <!-- ריבוע יעד — כתום מקווקו כמו קודם -->
      <div class="tile" style="margin:0;border-color:#f7931a;border-style:dashed;">
        <div class="tile-lbl" style="color:#fff">🎯 יעד</div>
        <div class="tile-price" style="color:#fff">$${fmt(lv.sell,0)}</div>
        <div class="tile-pct" style="color:#fff">+$${fmt(lv.profit,4)}</div>
        <div class="tile-sub" style="color:#fff">מכירה</div>
      </div>
    </div>`;
  });

  // רמות ממתינות — מוצגות על הגרף, לא כאן

  return html || '<div class="empty-hint">אין פעילות היום — הרובוט ממתין לתנועת מחיר</div>';
}

// ── Grid Target Levels Panel ───────────────────────────────────
function buildTargetLevels(s, btc) {
  if (!s || !s.grid || !btc) return '<span style="color:#aaa;font-size:.6rem">טוען...</span>';

  const grid = s.grid;
  // מצא את הרמה הנוכחית
  const curIdx = grid.findIndex(lv => btc >= lv.buy && btc < lv.sell);
  const ci = curIdx >= 0 ? curIdx : grid.reduce((best,lv,i) =>
    Math.abs(lv.buy - btc) < Math.abs(grid[best].buy - btc) ? i : best, 0);

  // קח 3 רמות מתחת (קנייה עתידית) + הרמה הנוכחית + 3 רמות מעל (מכירה)
  const from = Math.max(0, ci - 3);
  const to   = Math.min(grid.length - 1, ci + 3);
  const levels = [];
  for (let i = to; i >= from; i--) levels.push({ ...grid[i], idx: i });

  return levels.map(lv => {
    const isCurrent = lv.idx === ci;
    const isFilled  = lv.filled;
    const isAbove   = lv.buy > btc;
    const isBelow   = lv.buy < btc && !isCurrent;

    let bg, border, label, arrow, priceColor;
    if (isCurrent) {
      bg = '#001a30'; border = '#f7931a'; label = '◉ כאן'; arrow = ''; priceColor = '#f7931a';
    } else if (isFilled && !isAbove) {
      bg = '#001a0e'; border = '#00e676'; label = '✅ קנוי'; arrow = '↑ SELL'; priceColor = '#00e676';
    } else if (isAbove) {
      bg = '#0a1520'; border = '#555'; label = '⏳ ממתין'; arrow = '↓ BUY'; priceColor = '#8ab0c8';
    } else {
      bg = '#0a1520'; border = '#555'; label = '⏳ ממתין'; arrow = '↓ BUY'; priceColor = '#8ab0c8';
    }

    const dist = btc > 0 ? ((lv.buy - btc) / btc * 100).toFixed(2) : '0';
    const distColor = parseFloat(dist) > 0 ? '#8ab0c8' : '#00e676';

    return `<div style="flex-shrink:0;background:${bg};border:1px solid ${border};border-radius:6px;padding:5px 8px;text-align:center;min-width:80px;">
      <div style="font-size:.58rem;color:#aaaaaa;margin-bottom:2px;">${label}</div>
      <div style="font-size:.78rem;font-weight:700;color:${priceColor}">$${fmt(lv.buy,0)}</div>
      <div style="font-size:.52rem;color:#00e676;margin-top:1px;">→$${fmt(lv.sell,0)}</div>
      <div style="font-size:.52rem;color:${distColor};margin-top:1px;">${dist > 0 ? '+' : ''}${dist}%</div>
      <div style="font-size:.52rem;color:#ffd700;margin-top:1px;">+$${fmt(lv.profit,4)}</div>
    </div>`;
  }).join(`<div style="display:flex;align-items:center;color:#555;font-size:.8rem;padding:0 2px;">›</div>`);
}


// ── Activity log builder (Pionex-style with transaction table)
function buildLogHtml(tradeLog, filter){
  let entries=[...tradeLog].reverse();
  if(filter==='sell') entries=entries.filter(t=>t.type==='SELL');
  else if(filter==='buy') entries=entries.filter(t=>t.type==='BUY');
  entries=entries.slice(0,40);
  if(!entries.length) return `<div style="text-align:center;padding:16px;color:#cccccc;font-size:.7rem">⏳ ממתין לתנועת מחיר</div>`;

  // Show as transaction table for SELL entries, simple rows for BUY
  if(filter==='sell' || filter==='all'){
    const sells = entries.filter(t=>t.type==='SELL');
    const buys  = entries.filter(t=>t.type==='BUY');
    let html = '';

    if(sells.length){
      html += `<table class="log-table"><thead><tr>
          <th>מחיר קנייה</th><th>מחיר מכירה</th><th>רווח</th><th>שעה</th>
        </tr></thead><tbody>`;
      sells.forEach(t=>{
        const sellPx = t.price||0;
        const buyPx  = sellPx - (t.profit||0)/(t.qty||0.00001) - sellPx*0.001;
        html += `<tr class="sell-row">
          <td><span class="num-ltr">$${fmt(buyPx,0)}</span></td>
          <td><span class="num-ltr">$${fmt(sellPx,0)}</span></td>
          <td class="green"><span class="num-ltr">+$${fmt(t.profit,4)}</span></td>
          <td>${fmtT(t.time)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    }

    if(filter==='all' && buys.length){
      html += buys.slice(0,10).map(t=>`<div class="log-entry">
        <div class="log-icon">🟡</div>
        <div class="log-info">
          <div class="log-title" style="color:#ffd700">BUY ↓ — $${fmt(t.price,0)}</div>
          <div class="log-sub">${fmt(t.qty,6)} BTC</div>
        </div>
        <div class="log-right"><div class="log-time">${fmtT(t.time)}</div></div>
      </div>`).join('');
    }
    return html || `<div style="text-align:center;padding:16px;color:#cccccc;font-size:.7rem">⏳ ממתין לתנועת מחיר</div>`;
  }

  return entries.map(t=>{
    const isSell=t.type==='SELL';
    const icon=isSell?'🟢':'🟡';
    const titleColor=isSell?'#00e676':'#ffd700';
    const profitHtml=isSell?`<div class="log-profit">+$${fmt(t.profit,4)}</div>`:'';
    return `<div class="log-entry">
      <div class="log-icon">${icon}</div>
      <div class="log-info">
        <div class="log-title" style="color:${titleColor}">${isSell?'SELL ↑':'BUY ↓'} — $${fmt(t.price,0)}</div>
        <div class="log-sub">${fmt(t.qty,6)} BTC</div>
      </div>
      <div class="log-right">
        ${profitHtml}
        <div class="log-time">${fmtT(t.time)}</div>
      </div>
    </div>`;
  }).join('');
}

function calcGrid(){
  const inv=parseFloat(document.getElementById('c-inv').value)||1000;
  const low=parseFloat(document.getElementById('c-low').value)||70000;
  const high=parseFloat(document.getElementById('c-high').value)||82000;
  const grids=parseInt(document.getElementById('c-grids').value)||50;
  if(high<=low||grids<2) return;

  const rangeSize=high-low;
  const stepPct=rangeSize/(grids*((low+high)/2))*100;
  const perLevel=inv/grids;
  const btcPerLevel=perLevel/((low+high)/2);
  const profitPerCycle=btcPerLevel*(rangeSize/grids)*0.9991; // minus 2×0.05% fee
  const cyclesPerDay=Math.max(0,(rangeSize/grids)/50*3); // rough estimate
  const dailyProfit=profitPerCycle*cyclesPerDay*grids*0.2; // conservative
  const apr=dailyProfit*365/inv*100;

  const el=document.getElementById('calc-results');
  el.innerHTML=[
    {l:'📏 צעד/רמה',v:`${fmt(stepPct,2)}%`},
    {l:'💵 הון/רמה',v:`$${fmt(perLevel,2)}`},
    {l:'₿ BTC/רמה',v:`${fmt(btcPerLevel,6)}`},
    {l:'💰 רווח/cycle',v:`$${fmt(profitPerCycle,4)}`},
    {l:'📅 רווח יומי (est)',v:`$${fmt(dailyProfit,3)}`},
    {l:'📈 APR (est)',v:`${fmt(apr,1)}%`},
  ].map(i=>`<div class="cr-item"><div class="cr-val">${i.v}</div><div class="cr-lbl">${i.l}</div></div>`).join('');
}

function renderWiz(){
  const c=wizContent[wizStep-1];
  document.getElementById('wiz-content').innerHTML=`
    <div class="wiz-title">${c.t}</div>
    <div class="wiz-desc">${c.d}${c.f}</div>`;
  for(let i=1;i<=4;i++){
    const el=document.getElementById('ws'+i);
    el.className='wiz-step'+(i===wizStep?' active':i<wizStep?' done':'');
  }
  const nav=document.getElementById('wiz-nav');
  let btns='';
  if(wizStep>1) btns+=`<button class="wiz-btn gray" onclick="goWiz(${wizStep-1})">← אחורה</button>`;
  if(wizStep<4) btns+=`<button class="wiz-btn primary" onclick="goWiz(${wizStep+1})">קדימה →</button>`;
  else btns+=`<button class="wiz-btn primary" onclick="closeModal('modal-wizard')">✅ סיום</button>`;
  nav.innerHTML=btns;
}

function goWiz(step){
  wizStep=step;
  renderWiz();
}

function closeModal(id){
  document.getElementById(id).classList.add('hidden');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o) o.classList.add('hidden');});
});

let tvWidgetLoaded=false, chartWs=null, chartResizeObs=null;

function bindChartResize(){
  const wrap=document.querySelector('.mg-chart-wrap');
  const tv=document.getElementById('tv-chart');
  if(!wrap||!tv) return;
  const apply=()=>{
    const w=Math.max(Math.floor(wrap.clientWidth),180);
    const h=Math.max(Math.floor(wrap.clientHeight),120);
    if(lwChart){
      try{ lwChart.resize(w,h); drawGridLines(); }catch(e){}
    }
    window.dispatchEvent(new Event('resize'));
  };
  apply();
  if(chartResizeObs) chartResizeObs.disconnect();
  chartResizeObs=new ResizeObserver(apply);
  chartResizeObs.observe(wrap);
  if(typeof ResizeObserver!=='undefined'){
    const col=document.querySelector('.mg-chart-col');
    if(col) chartResizeObs.observe(col);
  }
}
let lwChart=null, candleSeries=null, priceLabelSeries=null, priceLines=[];
const LW_ENABLED = false; // השתמש ב-TradingView Widget

// Real-time BTC price via WebSocket (header only)
function connectPriceWs(){
  if(chartWs){ try{ chartWs.close(); }catch(e){} }
  chartWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
  chartWs.onmessage = (evt)=>{
    try{
      const d = JSON.parse(evt.data);
      const btc = parseFloat(d.c);
      const el = document.querySelector('.btc-now');
      if(el && btc>0) el.textContent='$'+btc.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    }catch(e){}
  };
  chartWs.onclose = ()=>setTimeout(connectPriceWs, 3000);
  chartWs.onerror = ()=>chartWs.close();
}

function loadTVChart(){
  const el=document.getElementById('tv-chart');
  if(!el) return;

  if(LW_ENABLED){
    // השתמש ב-Lightweight Charts — תומך קווי גריד אמיתיים
    if(lwChart) return; // כבר טעון
    loadLWScript(el);
    return;
  }

  // TradingView Widget (fallback)
  if(tvWidgetLoaded && el.querySelector('iframe')) return;
  el.innerHTML=''; tvWidgetLoaded=false;
  const s=document.createElement('script');
  s.src='https://s3.tradingview.com/tv.js';
  s.onload=()=>{
    new TradingView.widget({
      container_id:'tv-chart', width:'100%', height:'100%',
      symbol:'BINANCE:BTCUSDT', interval:'15', timezone:'Asia/Jerusalem',
      theme:'dark', style:'1', locale:'he_IL', toolbar_bg:'#070d14',
      enable_publishing:false, hide_top_toolbar:false,
      backgroundColor:'#070d14', gridColor:'#0d1820',
      studies:[],
    });
    tvWidgetLoaded=true;
    setTimeout(bindChartResize, 350);
  };
  document.head.appendChild(s);
  connectPriceWs();
}

function loadLWScript(el){
  // אם הגרף כבר קיים ב-DOM — לא נגע בו
  if(lwChart && el.querySelector('canvas')) return;
  // גרף נהרס ברענון — נאפס ונבנה מחדש
  lwChart=null; candleSeries=null; priceLabelSeries=null; priceLines=[];
  el.innerHTML='';
  if(window.LightweightCharts){ buildLWChart(el); connectPriceWs(); return; }
  const s=document.createElement('script');
  s.src='https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js';
  s.onload=()=>{ buildLWChart(el); };
  document.head.appendChild(s);
  connectPriceWs();
}

async function buildLWChart(el){
  const rect=el.getBoundingClientRect();
  const w=rect.width||800, h=rect.height||400;

  lwChart=LightweightCharts.createChart(el,{
    width:w, height:h,
    layout:{ background:{type:'solid',color:'#070d14'}, textColor:'#ffffff' },
    grid:{ vertLines:{color:'transparent'}, horzLines:{color:'transparent'} },
    crosshair:{
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{ color:'#ffd700', labelBackgroundColor:'#ffd700' },
      horzLine:{ color:'#ffd700', labelBackgroundColor:'#ffd700' },
    },
    rightPriceScale:{ borderColor:'#0f2030', scaleMargins:{top:0.05,bottom:0.05} },
    timeScale:{ borderColor:'#0f2030', timeVisible:true, secondsVisible:false, rightOffset:5 },
  });

  const wrap=el.closest('.mg-chart-wrap')||el;
  new ResizeObserver(entries=>{
    for(const e of entries){
      if(lwChart) lwChart.resize(e.contentRect.width, e.contentRect.height);
    }
  }).observe(wrap);

  candleSeries=lwChart.addCandlestickSeries({
    upColor:'#00e676', downColor:'#ff5252',
    borderUpColor:'#00e676', borderDownColor:'#ff5252',
    wickUpColor:'#00a050', wickDownColor:'#cc3030',
    lastValueVisible: false,
    priceLineVisible: false,
    priceFormat:{ type:'price', precision:2, minMove:0.01 },
  });
  // White label for current price on axis
  lwChart.applyOptions({
    rightPriceScale:{
      borderColor:'#0f2030',
      scaleMargins:{top:0.05,bottom:0.05},
    },
    layout:{
      background:{type:'solid',color:'#070d14'},
      textColor:'#ffffff',
    },
  });


  try{
    const res=await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=500');
    const data=await res.json();
    const candles = data.map(k=>({
      time:  Math.floor(k[0]/1000),
      open:  parseFloat(k[1]),
      high:  parseFloat(k[2]),
      low:   parseFloat(k[3]),
      close: parseFloat(k[4]),
    }));
    candleSeries.setData(candles);

    // ציור קווי גריד אחרי טעינת נתונים
    setTimeout(drawGridLines, 500);

  }catch(e){ console.error('Binance fetch failed',e); }

  // ── Real-time WebSocket from Binance ──────────────────────────
  connectChartWs();

  // Invisible line series — gives us a pure white axis label for current price
  priceLabelSeries = lwChart.addLineSeries({
    color:'rgba(0,0,0,0)', lineWidth:1,
    lastValueVisible:true, priceLineVisible:false,
    crosshairMarkerVisible:false,
  });

  drawGridLines();
}

function clearGridLines(){
  if(!candleSeries) return;
  priceLines.forEach(pl=>{ try{ candleSeries.removePriceLine(pl); }catch(e){} });
  priceLines=[];
}

function drawGridLines(){
  const s=botData['grid']?.state;
  if(!candleSeries||!s||!s.grid) return;
  clearGridLines();

  const btc=parseFloat(document.querySelector('.btc-now')?.textContent?.replace(/[$,]/g,'')||0);
  if(!btc) return;

  // ציור כל רמות הגריד
  s.grid.forEach(lv => {
    const isFilled  = lv.filled;
    const isCurrent = btc >= lv.buy && btc < lv.sell;

    // קו קנייה
    priceLines.push(candleSeries.createPriceLine({
      price:            lv.buy,
      color:            isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff',
      lineWidth:        isCurrent ? 3 : isFilled ? 2 : 1,
      lineStyle:        isFilled || isCurrent ? LightweightCharts.LineStyle.Solid : LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: false,
      title:            '',
    }));

    // קו מכירה — רק לרמות קנויות
    if(isFilled){
      priceLines.push(candleSeries.createPriceLine({
        price:            lv.sell,
        color:            '#ff3333',
        lineWidth:        2,
        lineStyle:        LightweightCharts.LineStyle.Dashed,
        axisLabelVisible: false,
        title:            '',
      }));
    }
  });

  // עדכון מחיר נוכחי
  if(btc>0 && priceLabelSeries){
    const now = Math.floor(Date.now()/1000);
    priceLabelSeries.setData([{ time: now-1, value: btc }, { time: now, value: btc }]);
  }
}

// ── Draw grid lines on overlay canvas ─────────────────────────
function drawOverlayGridLines() {
  const canvas = document.getElementById('grid-overlay');
  if (!canvas) return;
  const s = botData['grid']?.state;
  if (!s || !s.grid) return;

  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width  = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const btc = parseFloat(document.querySelector('.btc-now')?.textContent?.replace(/[$,]/g,'') || 0);
  if (!btc) return;

  // מחיר גבוה ונמוך נראה בגרף — נאמוד לפי ATR
  const atr   = s.atr14 || 1000;
  const upper = s.upper || (btc + atr * 3);
  const lower = s.lower || (btc - atr * 3);

  // הצג רק רמות שנמצאות בטווח הנראה
  const visibleLevels = s.grid.filter(lv => lv.buy >= lower * 0.98 && lv.buy <= upper * 1.02);

  const priceToY = (price) => {
    return H - ((price - lower) / (upper - lower)) * H;
  };

  visibleLevels.forEach(lv => {
    const isFilled = lv.filled;
    const isCurrent = btc >= lv.buy && btc < lv.sell;
    const buyY  = priceToY(lv.buy);
    const sellY = priceToY(lv.sell);

    // קו קנייה — לבן מואר
    ctx.beginPath();
    ctx.strokeStyle = isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff';
    ctx.lineWidth   = isCurrent ? 3 : 2;
    ctx.globalAlpha = 1.0;
    ctx.shadowColor = isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff';
    ctx.shadowBlur  = 8;
    ctx.setLineDash(isFilled ? [] : [6, 3]);
    ctx.moveTo(0, buyY);
    ctx.lineTo(W, buyY);
    ctx.stroke();

    // תווית מחיר קנייה
    ctx.shadowBlur = 0;
    ctx.setLineDash([]);
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff';
    ctx.globalAlpha = 1.0;
    const label = isFilled ? `✅ BUY $${Math.round(lv.buy).toLocaleString()}` :
                  isCurrent ? `◉ $${Math.round(lv.buy).toLocaleString()}` :
                  `↓ BUY $${Math.round(lv.buy).toLocaleString()}`;
    ctx.fillText(label, 6, buyY - 3);

    // קו מכירה — אדום מואר
    if (isFilled) {
      ctx.beginPath();
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth   = 2;
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur  = 8;
      ctx.setLineDash([4, 4]);
      ctx.moveTo(0, sellY);
      ctx.lineTo(W, sellY);
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.setLineDash([]);
      ctx.fillStyle = '#ff4444';
      ctx.fillText(`↑ SELL $${Math.round(lv.sell).toLocaleString()}`, 6, sellY - 3);
    }
  });

  ctx.globalAlpha = 1.0;
  ctx.shadowBlur  = 0;
}

function switchBot(id,e){
  document.querySelectorAll('.bot-card').forEach(c=>c.classList.remove('active'));
  e.currentTarget.classList.add('active');
}

function startCountdown(){
  clearInterval(timer); countdown=60;
  timer=setInterval(()=>{
    countdown--;
    const el=document.getElementById('ref');
    if(el) el.textContent=`BTC עכשיו | מתרענן בעוד ${countdown}ש׳`;
    if(countdown<=0){clearInterval(timer);load();}
  },1000);
}

if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>{ setTimeout(bindChartResize, 50); });
}
