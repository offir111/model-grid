<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Model GRID — מרכז שליטה</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100vh; overflow:hidden; background:#070d14; color:#dce8f0; font-family:'Segoe UI',Arial,sans-serif; }

    .root {
      display: grid;
      grid-template-rows: 48px 80px 1fr 20px;
      grid-template-columns: 230px 1fr 290px;
      height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      grid-column: 1 / -1;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px;
      background:#080f18; border-bottom:1px solid #0f2030;
    }
    .header-title { font-size:.95rem; font-weight:700; color:#00d4ff; letter-spacing:1px; }
    .header-sub   { font-size:.6rem; color:#2a4a6a; margin-top:1px; }
    .btc-now      { font-size:1.35rem; font-weight:800; color:#f7931a; }
    .ref-txt      { font-size:.58rem; color:#2a4a6a; text-align:left; margin-top:1px; }
    .hm           { display:flex; gap:18px; }
    .hmi          { text-align:center; }
    .hmi-v        { font-size:.88rem; font-weight:700; }
    .hmi-l        { font-size:.58rem; color:#2a4a6a; margin-top:1px; }

    /* ── BOTS BAR ── */
    .bots-bar {
      grid-column:1/-1;
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:7px; padding:7px 14px;
      background:#060c14; border-bottom:1px solid #0f2030;
    }
    .bot-card {
      background:#0a1520; border:1px solid #152535; border-radius:8px;
      padding:6px 10px; cursor:pointer;
      transition:border-color .2s,background .2s;
      display:flex; align-items:center; gap:8px;
    }
    .bot-card:hover { border-color:#00d4ff44; background:#0d1e2e; }
    .bot-card.active { border-color:#00d4ff; background:#0d1e30; }
    .bc-dot  { width:5px;height:5px;border-radius:50%;background:#00e676;flex-shrink:0;animation:pulse 2s infinite; }
    .bc-icon { font-size:1.2rem; flex-shrink:0; }
    .bc-r    { flex:1; min-width:0; }
    .bc-name { font-size:.73rem; font-weight:700; color:#8ab0cc; }
    .bc-row  { display:flex; gap:6px; margin-top:2px; align-items:center; flex-wrap:wrap; }
    .bc-pnl  { font-size:.78rem; font-weight:700; }
    .bc-wl   { font-size:.62rem; }
    .bc-lbl  { font-size:.6rem; color:#3a6a8a; margin-right:auto; }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── LEFT STATS ── */
    .left {
      grid-column:1; padding:7px 6px 7px 12px;
      display:flex; flex-direction:column; gap:6px; overflow:hidden;
    }
    .card { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:7px 10px; }
    .cl   { font-size:.58rem; color:#2a4a6a; text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px; }
    .cv   { font-size:1.05rem; font-weight:700; }
    .cs   { font-size:.58rem; color:#1a3a5a; margin-top:2px; }
    .green{color:#00e676;} .blue{color:#00d4ff;} .orange{color:#f7931a;} .gray{color:#7a9ab0;}

    .grid-viz { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:7px 10px; }
    .vt  { font-size:.58rem; color:#2a4a6a; text-transform:uppercase; letter-spacing:.6px; margin-bottom:5px; }
    .rl  { display:flex; justify-content:space-between; font-size:.58rem; color:#2a4a6a; margin-bottom:3px; }
    .rb  { position:relative; height:16px; background:#0a1520; border-radius:8px; border:1px solid #152535; overflow:visible; margin-bottom:7px; }
    .rf  { height:100%; background:linear-gradient(90deg,#003a5a,#005a8a); border-radius:8px 0 0 8px; }
    .pp  { position:absolute; top:-4px; width:2px; height:24px; background:#f7931a; border-radius:2px; transform:translateX(-50%); box-shadow:0 0 6px #f7931a88; }
    .pl  { position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:.58rem; color:#f7931a; white-space:nowrap; font-weight:700; }
    .gm4 { display:grid; grid-template-columns:repeat(2,1fr); gap:4px; }
    .gm  { background:#0a1520; border-radius:5px; padding:4px 6px; text-align:center; border:1px solid #0f2030; }
    .gmv { font-size:.82rem; font-weight:700; color:#00d4ff; }
    .gml { font-size:.55rem; color:#1a3a5a; margin-top:1px; }

    .fills-wrap { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:6px 8px; flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .ft   { font-size:.58rem; color:#2a4a6a; text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
    .fscr { flex:1; overflow-y:auto; }
    table { width:100%; border-collapse:collapse; }
    thead th { color:#1a3a5a; font-size:.56rem; text-transform:uppercase; padding:3px 5px; border-bottom:1px solid #0f2030; text-align:right; }
    tbody tr { border-bottom:1px solid #09151f; }
    tbody td { padding:3px 5px; font-size:.68rem; }
    .bs { background:#003a20; color:#00e676; padding:1px 6px; border-radius:7px; font-size:.64rem; font-weight:700; }
    .pp2{ color:#00e676; font-weight:600; }

    /* ── CENTER — CHART ── */
    .center {
      grid-column:2;
      display:flex; flex-direction:column;
      border-left:1px solid #0f2030; border-right:1px solid #0f2030;
      overflow:hidden;
    }
    .chart-header {
      padding:5px 12px;
      font-size:.6rem; color:#2a4a6a; text-transform:uppercase; letter-spacing:.8px;
      border-bottom:1px solid #0f2030; flex-shrink:0;
      display:flex; justify-content:space-between; align-items:center;
    }
    .chart-wrap { flex:1; overflow:hidden; }
    #tv-chart   { width:100%; height:100%; }

    /* ── RIGHT — LEVELS ── */
    .right {
      grid-column:3;
      display:flex; flex-direction:column; overflow:hidden;
      background:#070d14;
    }
    .rt {
      padding:6px 10px 5px;
      font-size:.6rem; color:#2a4a6a; text-transform:uppercase; letter-spacing:.7px;
      border-bottom:1px solid #0f2030; flex-shrink:0;
      display:flex; justify-content:space-between; align-items:center;
    }
    .leg { display:flex; gap:7px; font-size:.56rem; }
    .leg span { display:flex; align-items:center; gap:3px; }
    .dg { width:5px;height:5px;border-radius:50%; }
    .ls { flex:1; overflow-y:auto; }
    .lt { width:100%; border-collapse:collapse; font-size:.7rem; }
    .lt thead th { position:sticky;top:0;background:#070d14;z-index:1; color:#1a3a5a; font-size:.56rem; text-transform:uppercase; padding:4px 6px; border-bottom:1px solid #0f2030; text-align:right; }
    .lt tbody tr { border-bottom:1px solid #09151f; }
    .lt tbody td { padding:3px 6px; }
    .lf { background:#001a0e; }
    .lc { background:#180d00; }

    /* ── STATUS ── */
    .status {
      grid-column:1/-1;
      background:#050b12; border-top:1px solid #0f2030;
      padding:2px 12px;
      display:flex; justify-content:space-between;
      font-size:.58rem; color:#1a3a5a;
    }
    .dl { width:5px;height:5px;background:#00e676;border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 2s infinite; }

    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:#070d14} ::-webkit-scrollbar-thumb{background:#152535;border-radius:2px}
  </style>
</head>
<body>
<div class="root" id="root">
  <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;color:#2a4a6a">טוען...</div>
</div>

<script>
const BOTS=[
  {id:'grid',name:'Model GRID',icon:'⚡',pUrl:'https://raw.githubusercontent.com/offir111/model-grid/master/data/portfolio.json',sUrl:'https://raw.githubusercontent.com/offir111/model-grid/master/data/grid_state.json',type:'grid'},
  {id:'bit', name:'Model BIT', icon:'₿',  pUrl:'https://raw.githubusercontent.com/offir111/model-bit/master/data/portfolio.json',type:'bit'},
  {id:'w',   name:'Model W',   icon:'🌊', pUrl:'https://raw.githubusercontent.com/offir111/model-w/master/data/performance_log.json',type:'w'},
  {id:'smc', name:'Model SMC', icon:'📊', pUrl:'https://raw.githubusercontent.com/offir111/model-smc/master/data/portfolio.json',type:'smc'}
];
const BTC_URL='https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';

let botData={}, countdown=60, timer, tvWidget=null;
const fmt =(n,d=2)=>n==null||isNaN(n)?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD=iso=>{if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('he-IL')+' '+d.toTimeString().slice(0,5);};
const dayS=iso=>Math.max(0.001,(Date.now()-new Date(iso).getTime())/86400000);

function parseSummary(bot,raw){
  if(!raw) return null;
  try{
    if(bot.type==='grid') return{pnl:raw.realized_pnl||0,wins:raw.total_cycles||0,losses:0,total:raw.total_cycles||0,winRate:100,apr:raw.apr||0,balance:(raw.investment||0)+(raw.realized_pnl||0),label:`APR ${fmt(raw.apr||0,1)}%`,updated:raw.last_updated};
    if(bot.type==='bit'||bot.type==='smc'){const s=raw.stats||{};return{pnl:raw.total_pnl||0,wins:s.wins||0,losses:s.losses||0,total:s.total||0,winRate:s.win_rate||0,apr:0,balance:(raw.available||0)+(raw.in_trades||0),label:`${fmt(s.win_rate||0,0)}% Win`,updated:raw.last_updated};}
    if(bot.type==='w'){const a=Array.isArray(raw)?raw:[];const wins=a.filter(t=>t.result==='win').length;const losses=a.filter(t=>t.result==='loss').length;const pnl=a.reduce((s,t)=>s+(t.pnl_usd||0),0);return{pnl,wins,losses,total:a.length,winRate:a.length>0?wins/a.length*100:0,apr:0,balance:1000+pnl,label:`${fmt(a.length>0?wins/a.length*100:0,0)}% Win`,updated:a.length>0?a[a.length-1].close_time:null};}
  }catch(e){return null;}
  return null;
}

async function fetchBot(bot){
  try{
    const r=await fetch(bot.pUrl+'?t='+Date.now());
    const raw=await r.json();
    botData[bot.id]={raw,summary:parseSummary(bot,raw)};
    if(bot.sUrl){const r2=await fetch(bot.sUrl+'?t='+Date.now());botData[bot.id].state=r2.ok?await r2.json():null;}
  }catch(e){botData[bot.id]={raw:null,summary:null,state:null};}
}

async function load(){
  const[btcRes]=await Promise.all([fetch(BTC_URL),...BOTS.map(b=>fetchBot(b))]);
  const btc=parseFloat((await btcRes.json()).price||0);
  render(btc);
}

function render(btc){
  const gD=botData['grid'],p=gD?.raw||{},s=gD?.state||null;
  const inv=p.investment||0,pnl=p.realized_pnl||0,total=inv+pnl;
  const apr=p.apr||0,cycles=p.total_cycles||0,dgt=p.dgt_count||0,mdd=p.max_drawdown||0;
  const d=p.start_time?dayS(p.start_time):0.8;
  const lower=s?s.lower:0,upper=s?s.upper:0,grids=s?s.grids:0,atr=s?s.atr14:0;
  const filled=s?s.grid.filter(l=>l.filled).length:0,waiting=grids-filled;
  const inPct=upper>lower&&btc>0?Math.max(0,Math.min(100,(btc-lower)/(upper-lower)*100)):0;
  const mid=s&&s.grid?s.grid[Math.floor(grids/2)]:null;
  const ppc=mid?mid.profit:0,perG=grids>0?inv/grids:0,dcyc=d>0?cycles/d:0;
  const pc=pnl>=0?'green':'red',ac=apr>=0?'green':'red';
  const log=(p.trade_log||[]).filter(t=>t.type==='SELL').slice(-6).reverse();

  const lvlRows=s&&s.grid?[...s.grid].reverse().map((lv,i)=>{
    const idx=grids-i,isFilled=lv.filled,isHere=!lv.filled&&btc>=lv.buy&&btc<lv.sell;
    let cls='',badge='';
    if(isFilled){cls='lf';badge=`<span style="color:#00e676;font-weight:700;font-size:.66rem">✅ קנוי</span>`;}
    else if(isHere){cls='lc';badge=`<span style="color:#f7931a;font-weight:700;font-size:.66rem">← כאן</span>`;}
    else badge=`<span style="color:#1a3060;font-size:.66rem">⏳</span>`;
    return `<tr class="${cls}"><td style="color:#1a3060;text-align:center;font-size:.6rem">${idx}</td><td style="font-weight:600;color:#8ab0c8">$${fmt(lv.buy,0)}</td><td style="color:#2a4a6a">$${fmt(lv.sell,0)}</td><td style="color:#00e676;font-size:.64rem">+$${fmt(lv.profit,4)}</td><td>${badge}</td></tr>`;
  }).join(''):'';

  const botCards=BOTS.map(bot=>{
    const sm=botData[bot.id]?.summary,isA=bot.id==='grid';
    if(!sm) return `<div class="bot-card ${isA?'active':''} loading"><div class="bc-icon">${bot.icon}</div><div class="bc-r"><div class="bc-name">${bot.name}</div><div class="bc-row"><span style="color:#1a3a5a;font-size:.6rem">טוען...</span></div></div></div>`;
    const pc2=sm.pnl>=0?'#00e676':'#ff5252',ps=sm.pnl>=0?'+':'';
    return `<div class="bot-card ${isA?'active':''}" onclick="switchBot('${bot.id}',event)"><div class="bc-dot"></div><div class="bc-icon">${bot.icon}</div><div class="bc-r"><div class="bc-name">${bot.name}</div><div class="bc-row"><span class="bc-pnl" style="color:${pc2}">${ps}$${fmt(sm.pnl,3)}</span><span class="bc-wl" style="color:#00a050">✅${sm.wins}</span><span class="bc-wl" style="color:#aa3030">❌${sm.losses}</span><span class="bc-lbl">${sm.label}</span></div></div></div>`;
  }).join('');

  document.getElementById('root').innerHTML=`
    <div class="header">
      <div><div class="header-title">⚡ MODEL GRID <span style="font-size:.6rem;color:#2a4a6a;font-weight:400">| מרכז שליטה 4 בוטים</span></div><div class="header-sub">Pionex AI Grid Bot 2.0 | BTC/USDT | סימולציה</div></div>
      <div class="hm">
        <div class="hmi"><div class="hmi-v blue">$${fmt(total)}</div><div class="hmi-l">שווי גריד</div></div>
        <div class="hmi"><div class="hmi-v ${pc}">${pnl>=0?'+':''}$${fmt(pnl,4)}</div><div class="hmi-l">רווח</div></div>
        <div class="hmi"><div class="hmi-v ${ac}">${fmt(apr,1)}%</div><div class="hmi-l">APR</div></div>
        <div class="hmi"><div class="hmi-v orange">${cycles}</div><div class="hmi-l">סייקלים</div></div>
        <div class="hmi"><div class="hmi-v gray">${fmt(d,1)}</div><div class="hmi-l">ימים</div></div>
      </div>
      <div><div class="btc-now">$${fmt(btc)}</div><div class="ref-txt" id="ref">BTC עכשיו | מתרענן בעוד ${countdown}ש׳</div></div>
    </div>

    <div class="bots-bar">${botCards}</div>

    <div class="left">
      <div class="card"><div class="cl">💰 השקעה</div><div class="cv gray">$${fmt(inv)}</div><div class="cs">התחלה: $${fmt(p.starting_investment||inv)}</div></div>
      <div class="card"><div class="cl">📈 רווח יומי</div><div class="cv green">~$${fmt(dcyc*ppc,4)}</div><div class="cs">${fmt(dcyc,1)} cycles/יום</div></div>
      <div class="card"><div class="cl">📉 MDD</div><div class="cv" style="color:${mdd>10?'#ff5252':'#7a9ab0'}">${fmt(mdd,2)}%</div><div class="cs">ירידה מקסימלית</div></div>
      <div class="card"><div class="cl">🔁 DGT</div><div class="cv gray">${dgt}</div><div class="cs">איפוסי טווח</div></div>

      <div class="grid-viz">
        <div class="vt">📐 מצב הגריד</div>
        <div class="rl"><span>$${fmt(lower,0)}</span><span style="color:#f7931a;font-weight:600">${fmt(inPct,0)}% בטווח</span><span>$${fmt(upper,0)}</span></div>
        <div class="rb"><div class="rf" style="width:${inPct}%"></div><div class="pp" style="left:${inPct}%"><div class="pl">$${fmt(btc,0)}</div></div></div>
        <div class="gm4">
          <div class="gm"><div class="gmv">${grids}</div><div class="gml">רמות</div></div>
          <div class="gm"><div class="gmv" style="color:#00e676">${filled}</div><div class="gml">קנויות</div></div>
          <div class="gm"><div class="gmv" style="color:#2a4a6a">${waiting}</div><div class="gml">ממתינות</div></div>
          <div class="gm"><div class="gmv" style="color:#f7931a">$${fmt(atr,0)}</div><div class="gml">ATR-14</div></div>
        </div>
      </div>

      <div class="fills-wrap">
        <div class="ft">📋 עסקאות אחרונות</div>
        <div class="fscr">
          ${log.length===0
            ?`<div style="text-align:center;padding:12px;color:#1a3060;font-size:.7rem">⏳ ממתין לתנועת מחיר</div>`
            :`<table><thead><tr><th>סוג</th><th>מחיר</th><th>רווח</th><th>זמן</th></tr></thead><tbody>${log.map(t=>`<tr><td><span class="bs">SELL</span></td><td style="font-weight:600">$${fmt(t.price,0)}</td><td class="pp2">+$${fmt(t.profit,4)}</td><td style="color:#1a3060">${fmtD(t.time)}</td></tr>`).join('')}</tbody></table>`}
        </div>
      </div>
    </div>

    <div class="center">
      <div class="chart-header">
        <span>📈 גרף נרות יפנים — BTC/USDT</span>
        <span style="color:#1a3a5a">TradingView | זמן אמת</span>
      </div>
      <div class="chart-wrap"><div id="tv-chart"></div></div>
    </div>

    <div class="right">
      <div class="rt">
        <span>📊 ${grids} רמות גריד</span>
        <div class="leg">
          <span><div class="dg" style="background:#00e676"></div>קנוי</span>
          <span><div class="dg" style="background:#f7931a"></div>כאן</span>
          <span><div class="dg" style="background:#1a3060"></div>ממתין</span>
        </div>
      </div>
      <div class="ls"><table class="lt"><thead><tr><th style="width:24px">#</th><th>קנייה</th><th>מכירה</th><th>רווח</th><th>סטטוס</th></tr></thead><tbody>${lvlRows}</tbody></table></div>
    </div>

    <div class="status">
      <div><span class="dl"></span>פעיל — GitHub Actions כל 15 דקות</div>
      <div>עדכון GRID: ${fmtD(p.last_updated)}</div>
      <div>$${fmt(perG,2)}/רמה | ~$${fmt(ppc,5)}/cycle</div>
      <div>התחלה: ${fmtD(p.start_time)}</div>
    </div>
  `;

  loadTVChart();
  startCountdown();
}

function loadTVChart(){
  const el=document.getElementById('tv-chart');
  if(!el) return;
  el.innerHTML='';
  const s=document.createElement('script');
  s.src='https://s3.tradingview.com/tv.js';
  s.onload=()=>{
    new TradingView.widget({
      container_id:'tv-chart',
      width:'100%', height:'100%',
      symbol:'BINANCE:BTCUSDT',
      interval:'15',
      timezone:'Asia/Jerusalem',
      theme:'dark',
      style:'1',
      locale:'he_IL',
      toolbar_bg:'#070d14',
      enable_publishing:false,
      hide_top_toolbar:false,
      hide_legend:false,
      save_image:false,
      backgroundColor:'#070d14',
      gridColor:'#0d1820',
    });
  };
  document.head.appendChild(s);
}

function switchBot(id,e){
  document.querySelectorAll('.bot-card').forEach(c=>c.classList.remove('active'));
  e.currentTarget.classList.add('active');
}

function startCountdown(){
  clearInterval(timer); countdown=60;
  timer=setInterval(()=>{
    countdown--;
    const el=document.getElementById('ref');
    if(el) el.textContent=`BTC עכשיו | מתרענן בעוד ${countdown}ש׳`;
    if(countdown<=0){clearInterval(timer);load();}
  },1000);
}

load();
</script>
</body>
</html>
