<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model GRID — Pionex AI Grid Bot 2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080c10;
      color: #e0e8f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 48px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      border-bottom: 1px solid #1a2a3a;
      padding-bottom: 24px;
    }
    .header-left h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 1px;
    }
    .header-left p {
      font-size: 1rem;
      color: #5a7a9a;
      margin-top: 4px;
    }
    .header-right {
      text-align: left;
    }
    .btc-price {
      font-size: 2.4rem;
      font-weight: 800;
      color: #f7931a;
    }
    .btc-label {
      font-size: 0.9rem;
      color: #5a7a9a;
      text-align: center;
      margin-top: 2px;
    }
    .refresh-info {
      font-size: 0.8rem;
      color: #3a5a7a;
      margin-top: 6px;
      text-align: left;
    }

    /* ── CARDS ROW ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: #0d1820;
      border: 1px solid #1a2f45;
      border-radius: 14px;
      padding: 24px 28px;
    }
    .card-label {
      font-size: 0.85rem;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .card-value {
      font-size: 2rem;
      font-weight: 700;
      color: #e0e8f0;
    }
    .card-value.green  { color: #00e676; }
    .card-value.red    { color: #ff5252; }
    .card-value.blue   { color: #00d4ff; }
    .card-value.orange { color: #f7931a; }
    .card-sub {
      font-size: 0.8rem;
      color: #3a5a7a;
      margin-top: 6px;
    }

    /* ── SECOND ROW ── */
    .cards2 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .card2 {
      background: #0a1520;
      border: 1px solid #152535;
      border-radius: 10px;
      padding: 18px 20px;
    }
    .card2-label {
      font-size: 0.78rem;
      color: #3a5a7a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card2-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: #b0c8e0;
    }

    /* ── GRID VISUALIZATION ── */
    .section {
      background: #0d1820;
      border: 1px solid #1a2f45;
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 1rem;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1a2f45;
    }

    /* Range bar */
    .range-bar-wrap {
      margin: 8px 0 24px 0;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #4a6a8a;
      margin-bottom: 8px;
    }
    .range-bar {
      position: relative;
      height: 28px;
      background: #0a1520;
      border-radius: 14px;
      border: 1px solid #1a2f45;
      overflow: visible;
    }
    .range-fill {
      height: 100%;
      background: linear-gradient(90deg, #003a5a, #005a8a);
      border-radius: 14px 0 0 14px;
      transition: width 0.6s ease;
    }
    .price-marker {
      position: absolute;
      top: -8px;
      width: 4px;
      height: 44px;
      background: #f7931a;
      border-radius: 2px;
      transform: translateX(-50%);
      box-shadow: 0 0 12px #f7931a88;
    }
    .price-marker-label {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #f7931a;
      white-space: nowrap;
      font-weight: 700;
    }

    /* Grid stats */
    .grid-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 8px;
    }
    .grid-stat {
      text-align: center;
      background: #0a1520;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #152535;
    }
    .grid-stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: #00d4ff;
    }
    .grid-stat-lbl {
      font-size: 0.78rem;
      color: #3a5a7a;
      margin-top: 4px;
    }

    /* Profit per cycle info */
    .profit-per-cycle {
      display: flex;
      align-items: center;
      gap: 32px;
      background: #0a1520;
      border-radius: 10px;
      padding: 16px 24px;
      margin-top: 20px;
      border: 1px solid #152535;
    }
    .ppc-item { text-align: center; }
    .ppc-val {
      font-size: 1.2rem;
      font-weight: 700;
      color: #00e676;
    }
    .ppc-lbl {
      font-size: 0.75rem;
      color: #3a5a7a;
      margin-top: 2px;
    }

    /* ── TRADE LOG ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: right;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #3a5a7a;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #1a2f45;
    }
    tbody tr {
      border-bottom: 1px solid #0f1e2d;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #0f1e2d; }
    tbody td {
      padding: 14px 16px;
      font-size: 0.95rem;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .badge-sell { background: #003a20; color: #00e676; }
    .badge-buy  { background: #0a2540; color: #00d4ff; }
    .profit-pos { color: #00e676; font-weight: 600; }
    .profit-neg { color: #ff5252; font-weight: 600; }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding: 12px 20px;
      background: #0a1520;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #3a5a7a;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #00e676;
      border-radius: 50%;
      display: inline-block;
      margin-left: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 80px;
      font-size: 1.2rem;
      color: #3a5a7a;
    }
    .spinner {
      border: 3px solid #1a2f45;
      border-top: 3px solid #00d4ff;
      border-radius: 50%;
      width: 48px; height: 48px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ── */
    .error-box {
      background: #1a0a0a;
      border: 1px solid #5a1a1a;
      border-radius: 10px;
      padding: 24px;
      color: #ff5252;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    טוען נתונים מ-GitHub...
  </div>
</div>

<script>
const PORTFOLIO_URL  = 'https://raw.githubusercontent.com/offir111/model-grid/master/data/portfolio.json';
const STATE_URL      = 'https://raw.githubusercontent.com/offir111/model-grid/master/data/grid_state.json';
const PRICE_URL      = 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';

let countdown = 60;
let timer;

function fmt(n, dec=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL') + '  ' + d.toTimeString().slice(0,5);
}
function daysSince(iso) {
  if (!iso) return 0;
  return Math.max(0.001, (Date.now() - new Date(iso).getTime()) / 86400000);
}

async function loadData() {
  try {
    const [pRes, sRes, prRes] = await Promise.all([
      fetch(PORTFOLIO_URL  + '?t=' + Date.now()),
      fetch(STATE_URL      + '?t=' + Date.now()),
      fetch(PRICE_URL),
    ]);

    const p    = await pRes.json();
    const s    = sRes.ok ? await sRes.json() : null;
    const prData = await prRes.json();
    const btcPrice = parseFloat(prData.price || 0);

    render(p, s, btcPrice);
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <div>שגיאה בטעינת הנתונים</div>
        <div style="font-size:0.85rem;margin-top:8px;color:#aa4444">${e.message}</div>
      </div>`;
  }
}

function render(p, s, btcPrice) {
  const inv        = p.investment || 0;
  const pnl        = p.realized_pnl || 0;
  const total      = inv + pnl;
  const apr        = p.apr || 0;
  const cycles     = p.total_cycles || 0;
  const dgt        = p.dgt_count || 0;
  const mdd        = p.max_drawdown || 0;
  const days       = daysSince(p.start_time);
  const startInv   = p.starting_investment || inv;
  const pnlPct     = inv > 0 ? (pnl / inv * 100) : 0;

  const lower   = s ? s.lower  : 0;
  const upper   = s ? s.upper  : 0;
  const grids   = s ? s.grids  : 0;
  const atr14   = s ? s.atr14  : 0;
  const filled  = s ? s.grid.filter(l => l.filled).length : 0;
  const waiting = grids - filled;
  const inPct   = (upper > lower && btcPrice > 0)
                  ? Math.max(0, Math.min(100, (btcPrice - lower) / (upper - lower) * 100))
                  : 0;
  const perGrid     = grids > 0 ? inv / grids : 0;
  const midLevel    = s && s.grid && s.grid.length > 0 ? s.grid[Math.floor(grids/2)] : null;
  const profitCycle = midLevel ? midLevel.profit : 0;
  const dailyCycles = days > 0 ? (cycles / days) : 0;
  const dailyProfit = dailyCycles * profitCycle;

  // Trade log — sells only
  const log    = (p.trade_log || []).filter(t => t.type === 'SELL').slice(-15).reverse();
  const lastDgt = s && s.last_dgt ? fmtDate(s.last_dgt) : '—';

  const pnlClass   = pnl >= 0 ? 'green' : 'red';
  const aprClass   = apr >= 0 ? 'green' : 'red';

  document.getElementById('app').innerHTML = `

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <h1>⚡ MODEL GRID</h1>
        <p>Pionex AI Grid Bot 2.0 &nbsp;|&nbsp; BTC/USDT &nbsp;|&nbsp; סימולציה</p>
      </div>
      <div class="header-right">
        <div class="btc-price">$${fmt(btcPrice)}</div>
        <div class="btc-label">מחיר BTC עכשיו</div>
        <div class="refresh-info" id="refresh-label">מתרענן בעוד ${countdown}ש׳</div>
      </div>
    </div>

    <!-- ROW 1 — Main KPIs -->
    <div class="cards">
      <div class="card">
        <div class="card-label">💼 שווי כולל</div>
        <div class="card-value blue">$${fmt(total)}</div>
        <div class="card-sub">התחלה: $${fmt(startInv)}</div>
      </div>
      <div class="card">
        <div class="card-label">📈 רווח מצטבר</div>
        <div class="card-value ${pnlClass}">${pnl >= 0 ? '+' : ''}$${fmt(pnl, 4)}</div>
        <div class="card-sub">${pnl >= 0 ? '+' : ''}${fmt(pnlPct, 3)}% על ההשקעה</div>
      </div>
      <div class="card">
        <div class="card-label">🚀 APR שנתי</div>
        <div class="card-value ${aprClass}">${fmt(apr, 1)}%</div>
        <div class="card-sub">מחושב על ${fmt(days, 1)} ימים</div>
      </div>
      <div class="card">
        <div class="card-label">🔄 סייקלים</div>
        <div class="card-value orange">${cycles.toLocaleString()}</div>
        <div class="card-sub">~${fmt(dailyCycles, 1)} ליום</div>
      </div>
    </div>

    <!-- ROW 2 — Secondary stats -->
    <div class="cards2">
      <div class="card2">
        <div class="card2-label">💰 השקעה</div>
        <div class="card2-value">$${fmt(inv)}</div>
      </div>
      <div class="card2">
        <div class="card2-label">🔁 DGT איפוסים</div>
        <div class="card2-value">${dgt}</div>
      </div>
      <div class="card2">
        <div class="card2-label">📉 MDD</div>
        <div class="card2-value" style="color:${mdd > 10 ? '#ff5252' : '#b0c8e0'}">${fmt(mdd, 2)}%</div>
      </div>
      <div class="card2">
        <div class="card2-label">📅 ימי פעילות</div>
        <div class="card2-value">${fmt(days, 1)}</div>
      </div>
      <div class="card2">
        <div class="card2-label">💵 רווח יומי</div>
        <div class="card2-value" style="color:#00e676">~$${fmt(dailyProfit, 4)}</div>
      </div>
    </div>

    <!-- GRID VISUALIZATION -->
    <div class="section">
      <div class="section-title">📐 מצב הגריד</div>

      <div class="range-bar-wrap">
        <div class="range-labels">
          <span>תחתית: $${fmt(lower)}</span>
          <span>מחיר BTC: <strong style="color:#f7931a">$${fmt(btcPrice)}</strong> — ${fmt(inPct, 0)}% בתוך הטווח</span>
          <span>פסגה: $${fmt(upper)}</span>
        </div>
        <div class="range-bar">
          <div class="range-fill" style="width:${inPct}%"></div>
          <div class="price-marker" style="left:${inPct}%">
            <div class="price-marker-label">$${fmt(btcPrice, 0)}</div>
          </div>
        </div>
      </div>

      <div class="grid-stats">
        <div class="grid-stat">
          <div class="grid-stat-val">${grids}</div>
          <div class="grid-stat-lbl">סה"כ רמות</div>
        </div>
        <div class="grid-stat">
          <div class="grid-stat-val" style="color:#00e676">${filled}</div>
          <div class="grid-stat-lbl">פעילות (קנויות)</div>
        </div>
        <div class="grid-stat">
          <div class="grid-stat-val" style="color:#5a7a9a">${waiting}</div>
          <div class="grid-stat-lbl">ממתינות לקנייה</div>
        </div>
        <div class="grid-stat">
          <div class="grid-stat-val" style="color:#f7931a">$${fmt(atr14)}</div>
          <div class="grid-stat-lbl">ATR-14 שעתי</div>
        </div>
      </div>

      <div class="profit-per-cycle">
        <div class="ppc-item">
          <div class="ppc-val">$${fmt(perGrid, 2)}</div>
          <div class="ppc-lbl">השקעה לרמה</div>
        </div>
        <div style="width:1px;height:40px;background:#1a2f45;margin:0 8px"></div>
        <div class="ppc-item">
          <div class="ppc-val">~$${fmt(profitCycle, 5)}</div>
          <div class="ppc-lbl">רווח ממוצע לסייקל</div>
        </div>
        <div style="width:1px;height:40px;background:#1a2f45;margin:0 8px"></div>
        <div class="ppc-item">
          <div class="ppc-val">$${fmt(lower)}&nbsp;↔&nbsp;$${fmt(upper)}</div>
          <div class="ppc-lbl">טווח גריד פעיל</div>
        </div>
        <div style="width:1px;height:40px;background:#1a2f45;margin:0 8px"></div>
        <div class="ppc-item">
          <div class="ppc-val">${lastDgt}</div>
          <div class="ppc-lbl">DGT איפוס אחרון</div>
        </div>
      </div>
    </div>

    <!-- TRADE LOG -->
    <div class="section">
      <div class="section-title">📋 עסקאות אחרונות (SELL)</div>
      ${log.length === 0 ? `
        <div style="text-align:center;padding:40px;color:#3a5a7a;font-size:1rem">
          ⏳ עדיין אין עסקאות סגורות — הגריד פועל, ממתין לחצייה ראשונה
        </div>
      ` : `
        <table>
          <thead>
            <tr>
              <th>סוג</th>
              <th>מחיר</th>
              <th>כמות BTC</th>
              <th>רווח</th>
              <th>תאריך ושעה</th>
            </tr>
          </thead>
          <tbody>
            ${log.map(t => `
              <tr>
                <td><span class="badge badge-sell">SELL ✓</span></td>
                <td style="font-weight:600">$${fmt(t.price)}</td>
                <td style="color:#5a7a9a">${t.qty ? fmt(t.qty, 6) : '—'} BTC</td>
                <td class="${(t.profit||0) >= 0 ? 'profit-pos' : 'profit-neg'}">
                  ${(t.profit||0) >= 0 ? '+' : ''}$${fmt(t.profit, 5)}
                </td>
                <td style="color:#4a6a8a">${fmtDate(t.time)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `}
    </div>

    <!-- GRID LEVELS TABLE -->
    ${s && s.grid ? `
    <div class="section">
      <div class="section-title">📊 כל רמות הגריד — ${grids} רמות</div>

      <div style="display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem">
          <span style="background:#003a20;color:#00e676;padding:3px 10px;border-radius:12px;font-weight:700">✅ קנוי</span>
          <span style="color:#4a6a8a">רמה שהמחיר ירד אליה — מחכה למכירה</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem">
          <span style="background:#1a0a00;color:#f7931a;padding:3px 10px;border-radius:12px;font-weight:700">← מחיר</span>
          <span style="color:#4a6a8a">רמה הקרובה ביותר למחיר הנוכחי</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem">
          <span style="background:#0a1520;color:#4a6a8a;padding:3px 10px;border-radius:12px;font-weight:700">⏳ ממתין</span>
          <span style="color:#4a6a8a">מחכה שהמחיר יגיע אליה</span>
        </div>
      </div>

      <div style="max-height:420px;overflow-y:auto;border-radius:10px;border:1px solid #1a2f45">
        <table style="font-size:0.88rem">
          <thead style="position:sticky;top:0;background:#0d1820;z-index:1">
            <tr>
              <th style="width:60px">#</th>
              <th>קנייה</th>
              <th>מכירה</th>
              <th>כמות BTC</th>
              <th>רווח לסייקל</th>
              <th>סטטוס</th>
            </tr>
          </thead>
          <tbody>
            ${[...s.grid].reverse().map((lvl, i) => {
              const idx      = grids - i;
              const isFilled = lvl.filled;
              const isNear   = !isFilled && btcPrice >= lvl.buy && btcPrice < lvl.sell;
              const isAbove  = lvl.buy > btcPrice;
              let rowStyle   = '';
              let badge      = '';
              if (isFilled) {
                rowStyle = 'background:#001a10;';
                badge    = '<span style="background:#003a20;color:#00e676;padding:3px 12px;border-radius:12px;font-size:0.8rem;font-weight:700">✅ קנוי</span>';
              } else if (isNear) {
                rowStyle = 'background:#1a0e00;';
                badge    = '<span style="background:#1a0a00;color:#f7931a;padding:3px 12px;border-radius:12px;font-size:0.8rem;font-weight:700">← מחיר כאן</span>';
              } else if (isAbove) {
                badge    = '<span style="color:#3a5a7a;font-size:0.82rem">⏳ ממתין</span>';
              } else {
                badge    = '<span style="color:#3a5a7a;font-size:0.82rem">⏳ ממתין</span>';
              }
              return `<tr style="${rowStyle}border-bottom:1px solid #0f1e2d">
                <td style="color:#3a5a7a;text-align:center">${idx}</td>
                <td style="font-weight:600;color:#b0c8e0">$${fmt(lvl.buy)}</td>
                <td style="color:#5a7a9a">$${fmt(lvl.sell)}</td>
                <td style="color:#3a5a7a">${lvl.qty ? fmt(lvl.qty, 6) : '—'}</td>
                <td style="color:#00e676">+$${fmt(lvl.profit, 5)}</td>
                <td>${badge}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div>
        <span class="status-dot"></span>
        בוט פעיל — מריץ כל 15 דקות ב-GitHub Actions
      </div>
      <div>עדכון אחרון מהבוט: ${fmtDate(p.last_updated)}</div>
      <div>התחלת סימולציה: ${fmtDate(p.start_time)}</div>
    </div>
  `;

  startCountdown();
}

function startCountdown() {
  clearInterval(timer);
  countdown = 60;
  timer = setInterval(() => {
    countdown--;
    const el = document.getElementById('refresh-label');
    if (el) el.textContent = `מתרענן בעוד ${countdown}ש׳`;
    if (countdown <= 0) {
      clearInterval(timer);
      loadData();
    }
  }, 1000);
}

loadData();
</script>
</body>
</html>
