<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Model GRID — מרכז שליטה</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100vh; overflow:hidden; background:#070d14; color:#dce8f0; font-family:'Segoe UI',Arial,sans-serif; }

    .root {
      display: grid;
      grid-template-rows: 52px 80px 1fr 20px;
      grid-template-columns: 240px 1fr 300px;
      height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      grid-column: 1 / -1;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px;
      background:#080f18; border-bottom:1px solid #0f2030;
    }
    .header-title { font-size:.95rem; font-weight:700; color:#ffd700; letter-spacing:1px; }
    .header-sub   { font-size:.6rem; color:#ffffff; margin-top:1px; }
    .btc-now      { font-size:1.35rem; font-weight:800; color:#f7931a; }
    .ref-txt      { font-size:.58rem; color:#ffffff; text-align:left; margin-top:1px; }
    .hm           { display:flex; gap:18px; align-items:center; }
    .hmi          { text-align:center; }
    .hmi-v        { font-size:.88rem; font-weight:700; }
    .hmi-l        { font-size:.58rem; color:#ffffff; margin-top:1px; }

    /* Status badge */
    .status-badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 8px; border-radius:20px;
      font-size:.6rem; font-weight:700; letter-spacing:.5px;
      margin-top:3px;
    }
    .sb-sim  { background:#0a2030; border:1px solid #005a8a; color:#ffd700; }
    .sb-live { background:#002a10; border:1px solid #005a30; color:#00e676; }
    .sb-dot  { width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite; }

    /* Header action buttons */
    .hdr-btns { display:flex; gap:6px; align-items:center; }
    .hdr-btn {
      background:#0d1820; border:1px solid #152535; border-radius:6px;
      color:#ffd700; font-size:.68rem; padding:4px 9px; cursor:pointer;
      transition:all .2s; white-space:nowrap;
    }
    .hdr-btn:hover { border-color:#ffd70055; color:#ffd700; background:#0f2030; }

    /* ── BOTS BAR ── */
    .bots-bar {
      grid-column:1/-1;
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:7px; padding:7px 14px;
      background:#060c14; border-bottom:1px solid #0f2030;
    }
    .bot-card {
      background:#0a1520; border:1px solid #152535; border-radius:8px;
      padding:6px 10px; cursor:pointer;
      transition:border-color .2s,background .2s;
      display:flex; align-items:center; gap:8px;
    }
    .bot-card:hover { border-color:#ffd70044; background:#0d1e2e; }
    .bot-card.active { border-color:#ffd700; background:#0d1e30; }
    .bc-dot  { width:5px;height:5px;border-radius:50%;background:#00e676;flex-shrink:0;animation:pulse 2s infinite; }
    .bc-icon { font-size:1.2rem; flex-shrink:0; }
    .bc-r    { flex:1; min-width:0; }
    .bc-name { font-size:.73rem; font-weight:700; color:#ffd700; }
    .bc-row  { display:flex; gap:6px; margin-top:2px; align-items:center; flex-wrap:wrap; }
    .bc-pnl  { font-size:.78rem; font-weight:700; }
    .bc-wl   { font-size:.62rem; }
    .bc-lbl  { font-size:.6rem; color:#ffffff; margin-right:auto; }
    .bc-badge { font-size:.52rem; padding:1px 5px; border-radius:8px; font-weight:700; }
    .bc-badge-sim  { background:#0a2030; border:1px solid #005a8a; color:#00a0cc; }
    .bc-badge-live { background:#002a10; border:1px solid #005a30; color:#00c050; }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── LEFT STATS ── */
    .left {
      grid-column:1; padding:7px 6px 7px 12px;
      display:flex; flex-direction:column; gap:5px; overflow:hidden;
    }
    .card { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:7px 10px; }
    .cl   { font-size:.58rem; color:#ffffff; text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px; }
    .cv   { font-size:1.05rem; font-weight:700; }
    .cs   { font-size:.58rem; color:#cccccc; margin-top:2px; }
    .green{color:#00e676;} .blue{color:#ffd700;} .orange{color:#f7931a;} .gray{color:#ffffff;}

    /* ── PIONEX STATS PANEL ── */
    .pionex-stats {
      background:#0d1820; border:1px solid #152535; border-radius:7px; padding:8px 10px;
    }
    .ps-title { font-size:.58rem; color:#ffffff; text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; }
    .ps-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; margin-bottom:4px; }
    .ps-item { background:#0a1520; border-radius:5px; padding:5px 6px; text-align:center; border:1px solid #0f2030; }
    .ps-val { font-size:.82rem; font-weight:700; }
    .ps-lbl { font-size:.52rem; color:#ffffff; margin-top:1px; }
    .ps-apr { font-size:.7rem; font-weight:700; color:#ffd700; margin-top:1px; }
    .ps-sep { border-top:1px solid #0f2030; margin:5px 0; }

    /* Profit Curve */
    .profit-curve { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:7px 10px; }
    .pc-title { font-size:.58rem; color:#ffffff; text-transform:uppercase; letter-spacing:.6px; margin-bottom:5px; display:flex; justify-content:space-between; }
    #profit-canvas { width:100%; height:55px; display:block; }

    /* Holdings */
    .holdings-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; }
    .hld-item { background:#0a1520; border:1px solid #0f2030; border-radius:5px; padding:4px 6px; text-align:center; }
    .hld-val { font-size:.72rem; font-weight:700; color:#ffd700; }
    .hld-lbl { font-size:.5rem; color:#ffffff; margin-top:1px; }

    /* Runtime */
    .runtime-bar { display:flex; justify-content:space-between; align-items:center; background:#0a1520; border-radius:5px; padding:4px 8px; border:1px solid #0f2030; margin-top:4px; }
    .rt-item { text-align:center; }
    .rt-val { font-size:.72rem; font-weight:700; color:#ffffff; }
    .rt-lbl { font-size:.5rem; color:#aaaaaa; }

    /* MDD badges */
    .mdd-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; margin-top:4px; }
    .mdd-item { background:#0a1520; border-radius:5px; padding:4px 6px; text-align:center; border:1px solid #0f2030; }
    .mdd-val { font-size:.7rem; font-weight:700; }
    .mdd-lbl { font-size:.5rem; color:#aaaaaa; }
    .cl{ color:#ffffff !important; font-size:.65rem !important; }
    .cs{ color:#ffffff !important; }
    .hmi-l{ color:#ffffff !important; font-weight:600 !important; }
    .gml{ color:#ffffff !important; font-weight:600 !important; }
    .bc-lbl{ color:#ffffff !important; }
    .header-sub{ color:#ffffff !important; }
    .log-sub{ color:#ffffff !important; font-weight:600 !important; }
    .log-time{ color:#ffffff !important; font-weight:600 !important; }
    .ft{ color:#ffffff !important; font-size:.68rem !important; font-weight:700 !important; }
    .lf-btn{ color:#ffffff !important; font-size:.62rem !important; border-color:#555 !important; }
    .lf-btn.act{ color:#ffd700 !important; border-color:#ffd700 !important; font-weight:700 !important; }
    .log-title{ color:#ffffff !important; font-size:.72rem !important; font-weight:700 !important; }
    .red  {color:#ff5252;}

    .grid-viz { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:7px 10px; }
    .vt  { font-size:.58rem; color:#ffffff; text-transform:uppercase; letter-spacing:.6px; margin-bottom:5px; }
    .rl  { display:flex; justify-content:space-between; font-size:.58rem; color:#ffffff; margin-bottom:3px; }
    .rb  { position:relative; height:16px; background:#0a1520; border-radius:8px; border:1px solid #152535; overflow:visible; margin-bottom:7px; }
    .rf  { height:100%; background:linear-gradient(90deg,#003a5a,#005a8a); border-radius:8px 0 0 8px; }
    .pp  { position:absolute; top:-4px; width:2px; height:24px; background:#f7931a; border-radius:2px; transform:translateX(-50%); box-shadow:0 0 6px #f7931a88; }
    .pl  { position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:.58rem; color:#f7931a; white-space:nowrap; font-weight:700; }
    .gm4 { display:grid; grid-template-columns:repeat(2,1fr); gap:4px; }
    .gm  { background:#0a1520; border-radius:5px; padding:4px 6px; text-align:center; border:1px solid #0f2030; }
    .gmv { font-size:.82rem; font-weight:700; color:#ffd700; }
    .gml { font-size:.55rem; color:#cccccc; margin-top:1px; }

    /* Activity Log */
    .log-wrap { background:#0d1820; border:1px solid #152535; border-radius:7px; padding:6px 8px; flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .log-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .ft   { font-size:.58rem; color:#ffffff; text-transform:uppercase; letter-spacing:.6px; }
    .log-filter { display:flex; gap:3px; }
    .lf-btn {
      font-size:.52rem; padding:1px 5px; border-radius:8px; cursor:pointer;
      background:#0a1520; border:1px solid #0f2030; color:#ffffff;
      transition:all .15s;
    }
    .lf-btn.act { background:#0a2535; border-color:#005a8a; color:#ffd700; }
    .fscr { flex:1; overflow-y:auto; }

    /* Log entry rows */
    .log-entry {
      display:flex; align-items:center; gap:6px;
      padding:3px 4px; border-bottom:1px solid #09151f;
      font-size:.65rem;
    }
    .log-icon { font-size:.8rem; flex-shrink:0; }
    .log-info { flex:1; min-width:0; }
    .log-title { font-weight:600; font-size:.66rem; }
    .log-sub   { font-size:.56rem; color:#ffffff; margin-top:1px; }
    .log-right { text-align:left; flex-shrink:0; }
    .log-profit { font-size:.68rem; font-weight:700; color:#00e676; }
    .log-time   { font-size:.54rem; color:#cccccc; margin-top:1px; }

    /* ── CENTER — CHART ── */
    .center {
      grid-column:2;
      display:flex; flex-direction:column;
      border-left:1px solid #0f2030; border-right:1px solid #0f2030;
      overflow:hidden;
    }
    .chart-header {
      padding:5px 12px;
      font-size:.6rem; color:#ffffff; text-transform:uppercase; letter-spacing:.8px;
      border-bottom:1px solid #0f2030; flex-shrink:0;
      display:flex; justify-content:space-between; align-items:center;
    }
    .chart-info { display:flex; gap:10px; align-items:center; font-size:.58rem; }
    .ci-item { display:flex; gap:3px; align-items:center; }
    .ci-dot  { width:8px;height:8px;border-radius:50%; }
    .chart-wrap { flex:1; overflow:hidden; position:relative; }
    #tv-chart   { width:100%; height:100%; }
    #grid-overlay {
      position:absolute; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:10;
    }

    /* ── RIGHT — LEVELS (visual) ── */
    .right {
      grid-column:3;
      display:flex; flex-direction:column; overflow:hidden;
      background:#070d14;
    }
    .rt {
      padding:6px 10px 5px;
      font-size:.6rem; color:#ffffff; text-transform:uppercase; letter-spacing:.7px;
      border-bottom:1px solid #0f2030; flex-shrink:0;
      display:flex; justify-content:space-between; align-items:center;
    }
    .leg { display:flex; gap:7px; font-size:.56rem; }
    .leg span { display:flex; align-items:center; gap:3px; }
    .dg { width:5px;height:5px;border-radius:50%; }
    .ls { flex:1; overflow-y:auto; padding:2px 0; }

    /* Visual grid level rows */
    .glv-row {
      padding:2px 8px;
      border-bottom:1px solid #09151f;
      display:flex; flex-direction:column; gap:1px;
    }
    .glv-row:hover { background:#0a1520; }
    .glv-top { display:flex; justify-content:space-between; align-items:center; font-size:.62rem; }
    .glv-num { color:#cccccc; font-size:.58rem; width:20px; flex-shrink:0; text-align:center; }
    .glv-buy  { color:#8ab0c8; font-weight:600; }
    .glv-sell { color:#ffffff; }
    .glv-prof { color:#00e676; font-size:.58rem; }
    .glv-badge { font-size:.58rem; font-weight:700; }
    .glv-bar-wrap { height:3px; background:#0a1520; border-radius:2px; overflow:hidden; }
    .glv-bar-fill { height:100%; border-radius:2px; transition:width .3s; }
    .glv-filled  .glv-bar-fill { background:#00e676; }
    .glv-current .glv-bar-fill { background:#f7931a; }
    .glv-waiting .glv-bar-fill { background:#152535; }
    .glv-filled  { background:#001a0e; }
    .glv-current { background:#180d00; }

    /* ── STATUS ── */
    .status {
      grid-column:1/-1;
      background:#050b12; border-top:1px solid #0f2030;
      padding:2px 12px;
      display:flex; justify-content:space-between;
      font-size:.58rem; color:#cccccc;
    }
    .dl { width:5px;height:5px;background:#00e676;border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 2s infinite; }

    /* ══ MODALS ══ */
    .modal-overlay {
      position:fixed; inset:0; background:#00000088; z-index:1000;
      display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(3px);
    }
    .modal-overlay.hidden { display:none; }
    .modal-box {
      background:#0d1820; border:1px solid #cccccc; border-radius:12px;
      padding:20px; min-width:340px; max-width:520px; width:90vw;
      box-shadow:0 8px 32px #00000080;
      position:relative;
    }
    .modal-title {
      font-size:.95rem; font-weight:700; color:#ffd700; margin-bottom:4px;
    }
    .modal-sub { font-size:.62rem; color:#ffffff; margin-bottom:16px; }
    .modal-close {
      position:absolute; top:12px; left:12px;
      background:none; border:none; color:#ffffff; font-size:1.1rem;
      cursor:pointer; line-height:1; padding:2px 6px;
    }
    .modal-close:hover { color:#ff5252; }

    /* Settings modal */
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .sg-item { background:#0a1520; border:1px solid #0f2030; border-radius:7px; padding:8px 10px; }
    .sg-label { font-size:.56rem; color:#ffffff; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
    .sg-val   { font-size:.9rem; font-weight:700; color:#ffd700; }
    .sg-sub   { font-size:.56rem; color:#cccccc; margin-top:2px; }
    .modal-note { background:#071520; border:1px solid #0f2535; border-radius:7px; padding:8px 10px; font-size:.62rem; color:#ffffff; }

    /* Calculator modal */
    .calc-form { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
    .cf-row { display:flex; flex-direction:column; gap:3px; }
    .cf-label { font-size:.6rem; color:#ffffff; text-transform:uppercase; letter-spacing:.5px; }
    .cf-input {
      background:#0a1520; border:1px solid #152535; border-radius:6px;
      color:#dce8f0; font-size:.82rem; padding:7px 10px; outline:none;
      transition:border-color .2s;
    }
    .cf-input:focus { border-color:#ffd70055; }
    .calc-btn {
      background:#003a5a; border:1px solid #005a8a; border-radius:7px;
      color:#ffd700; font-size:.72rem; font-weight:700; padding:8px;
      cursor:pointer; transition:all .2s; width:100%;
    }
    .calc-btn:hover { background:#004a6a; }
    .calc-results { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .cr-item { background:#0a1520; border:1px solid #0f2030; border-radius:7px; padding:8px 10px; text-align:center; }
    .cr-val { font-size:.9rem; font-weight:700; color:#00e676; }
    .cr-lbl { font-size:.56rem; color:#ffffff; margin-top:2px; }

    /* Wizard modal */
    .wiz-steps { display:flex; gap:6px; margin-bottom:18px; }
    .wiz-step {
      flex:1; text-align:center; padding:6px 4px;
      border-radius:7px; font-size:.6rem;
      background:#0a1520; border:1px solid #0f2030; color:#ffffff;
      transition:all .2s; cursor:pointer;
    }
    .wiz-step.active { background:#002535; border-color:#005a8a; color:#ffd700; font-weight:700; }
    .wiz-step.done   { background:#002510; border-color:#005a30; color:#00a050; }
    .wiz-num  { font-size:.8rem; font-weight:700; display:block; margin-bottom:2px; }
    .wiz-lbl  { font-size:.54rem; }
    .wiz-content { background:#0a1520; border:1px solid #0f2030; border-radius:8px; padding:14px; margin-bottom:14px; min-height:130px; }
    .wiz-title { font-size:.82rem; font-weight:700; color:#ffd700; margin-bottom:6px; }
    .wiz-desc  { font-size:.66rem; color:#ffffff; line-height:1.6; }
    .wiz-field { margin-top:10px; }
    .wiz-nav { display:flex; gap:8px; justify-content:flex-start; }
    .wiz-btn {
      background:#0a2030; border:1px solid #005a8a; border-radius:7px;
      color:#ffd700; font-size:.68rem; font-weight:700; padding:6px 16px;
      cursor:pointer; transition:all .2s;
    }
    .wiz-btn:hover { background:#003a50; }
    .wiz-btn.primary { background:#003a5a; }
    .wiz-btn.gray    { background:#0a1520; border-color:#152535; color:#ffffff; }

    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:#070d14} ::-webkit-scrollbar-thumb{background:#152535;border-radius:2px}
  </style>
</head>
<body>
<div class="root" id="root">
  <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;color:#ffffff">טוען...</div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div class="modal-overlay hidden" id="modal-settings">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-settings')">✕</button>
    <div class="modal-title">⚙️ הגדרות בוט נוכחיות</div>
    <div class="modal-sub">פרמטרים שחושבו ע״י AI — מתעדכנים אוטומטית בכל DGT Reset</div>
    <div class="settings-grid" id="settings-content"></div>
    <div class="modal-note">💡 שינוי פרמטרים דורש עריכת <code>grid_simulator.py</code> ב-GitHub ו-push. הבוט יאפס בריצה הבאה.</div>
  </div>
</div>

<!-- ══ CALCULATOR MODAL ══ -->
<div class="modal-overlay hidden" id="modal-calc">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-calc')">✕</button>
    <div class="modal-title">📐 מחשבון גריד</div>
    <div class="modal-sub">חשב רווחיות לפי פרמטרים שאתה בוחר</div>
    <div class="calc-form">
      <div class="cf-row">
        <label class="cf-label">💰 הון השקעה ($)</label>
        <input class="cf-input" id="c-inv" type="number" value="1000" min="100" step="100" />
      </div>
      <div class="cf-row">
        <label class="cf-label">⬇️ מחיר תחתון ($)</label>
        <input class="cf-input" id="c-low" type="number" value="70000" step="100" />
      </div>
      <div class="cf-row">
        <label class="cf-label">⬆️ מחיר עליון ($)</label>
        <input class="cf-input" id="c-high" type="number" value="82000" step="100" />
      </div>
      <div class="cf-row">
        <label class="cf-label">🔢 מספר רמות גריד</label>
        <input class="cf-input" id="c-grids" type="number" value="50" min="5" max="200" />
      </div>
    </div>
    <button class="calc-btn" onclick="calcGrid()">⚡ חשב</button>
    <div style="height:12px;"></div>
    <div class="calc-results" id="calc-results"></div>
  </div>
</div>

<!-- ══ WIZARD MODAL ══ -->
<div class="modal-overlay hidden" id="modal-wizard">
  <div class="modal-box" style="max-width:480px;">
    <button class="modal-close" onclick="closeModal('modal-wizard')">✕</button>
    <div class="modal-title">🧙 אשף הגדרת גריד</div>
    <div class="modal-sub">הגדרה ב-4 שלבים פשוטים</div>
    <div class="wiz-steps">
      <div class="wiz-step active" id="ws1" onclick="goWiz(1)"><span class="wiz-num">1</span><span class="wiz-lbl">זוג</span></div>
      <div class="wiz-step"       id="ws2" onclick="goWiz(2)"><span class="wiz-num">2</span><span class="wiz-lbl">טווח</span></div>
      <div class="wiz-step"       id="ws3" onclick="goWiz(3)"><span class="wiz-num">3</span><span class="wiz-lbl">הון</span></div>
      <div class="wiz-step"       id="ws4" onclick="goWiz(4)"><span class="wiz-num">4</span><span class="wiz-lbl">אישור</span></div>
    </div>
    <div class="wiz-content" id="wiz-content"></div>
    <div class="wiz-nav" id="wiz-nav"></div>
  </div>
</div>

<script>
const BOTS=[
  {id:'grid',name:'Model GRID',icon:'⚡',pUrl:'https://raw.githubusercontent.com/offir111/model-grid/master/data/portfolio.json',sUrl:'https://raw.githubusercontent.com/offir111/model-grid/master/data/grid_state.json',type:'grid'},
  {id:'bit', name:'Model BIT', icon:'₿',  pUrl:'https://raw.githubusercontent.com/offir111/model-bit/master/data/portfolio.json',type:'bit'},
  {id:'w',   name:'Model W',   icon:'🌊', pUrl:'https://raw.githubusercontent.com/offir111/model-w/master/data/performance_log.json',type:'w'},

function parseSummary(bot,raw){
  if(!raw) return null;
  try{
    if(bot.type==='grid') return{pnl:raw.realized_pnl||0,wins:raw.total_cycles||0,losses:0,total:raw.total_cycles||0,winRate:100,apr:raw.apr||0,balance:(raw.investment||0)+(raw.realized_pnl||0),label:`APR ${fmt(raw.apr||0,1)}%`,updated:raw.last_updated};
    if(bot.type==='bit'||bot.type==='smc'){const s=raw.stats||{};return{pnl:raw.total_pnl||0,wins:s.wins||0,losses:s.losses||0,total:s.total||0,winRate:s.win_rate||0,apr:0,balance:(raw.available||0)+(raw.in_trades||0),label:`${fmt(s.win_rate||0,0)}% Win`,updated:raw.last_updated};}
    if(bot.type==='w'){const a=Array.isArray(raw)?raw:[];const wins=a.filter(t=>t.result==='win').length;const losses=a.filter(t=>t.result==='loss').length;const pnl=a.reduce((s,t)=>s+(t.pnl_usd||0),0);return{pnl,wins,losses,total:a.length,winRate:a.length>0?wins/a.length*100:0,apr:0,balance:1000+pnl,label:`${fmt(a.length>0?wins/a.length*100:0,0)}% Win`,updated:a.length>0?a[a.length-1].close_time:null};}
  }catch(e){return null;}
  return null;
}

// ── Profit Curve (Pionex-style stepped chart) ──────────────────
function drawProfitCurve(tradeLog, totalPnl) {
  const canvas = document.getElementById('profit-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 200;
  const H = 55;
  canvas.width  = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  // Build stepped profit array from sell trades
  const sells = tradeLog.filter(t => t.type === 'SELL').slice(-60);
  if (sells.length === 0) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ממתין לעסקאות...', W/2, H/2);
    return;
  }

  let running = 0;
  const pts = sells.map(t => { running += (t.profit||0); return running; });
  pts.unshift(0);

  const minV = Math.min(...pts), maxV = Math.max(...pts);
  const range = maxV - minV || 1;
  const toY = v => H - 6 - ((v - minV) / range) * (H - 12);
  const toX = i => (i / (pts.length - 1)) * W;

  // Fill area
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(0,230,118,0.3)');
  grad.addColorStop(1, 'rgba(0,230,118,0.02)');
  ctx.beginPath();
  ctx.moveTo(toX(0), H);
  pts.forEach((v, i) => {
    if (i > 0) ctx.lineTo(toX(i-1), toY(pts[i-1])); // stepped
    ctx.lineTo(toX(i), toY(v));
  });
  ctx.lineTo(toX(pts.length-1), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Stepped line
  ctx.beginPath();
  ctx.strokeStyle = '#00e676';
  ctx.lineWidth = 1.5;
  pts.forEach((v, i) => {
    if (i === 0) { ctx.moveTo(toX(i), toY(v)); return; }
    ctx.lineTo(toX(i-1), toY(pts[i-1]));
    ctx.lineTo(toX(i), toY(v));
  });
  ctx.stroke();

  // Final value label
  ctx.fillStyle = '#00e676';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`+$${totalPnl.toFixed(2)}`, 4, 10);
}

// ── Grid Target Levels Panel ───────────────────────────────────
function buildTargetLevels(s, btc) {
  if (!s || !s.grid || !btc) return '<span style="color:#aaa;font-size:.6rem">טוען...</span>';

  const grid = s.grid;
  // מצא את הרמה הנוכחית
  const curIdx = grid.findIndex(lv => btc >= lv.buy && btc < lv.sell);
  const ci = curIdx >= 0 ? curIdx : grid.reduce((best,lv,i) =>
    Math.abs(lv.buy - btc) < Math.abs(grid[best].buy - btc) ? i : best, 0);

  // קח 3 רמות מתחת (קנייה עתידית) + הרמה הנוכחית + 3 רמות מעל (מכירה)
  const from = Math.max(0, ci - 3);
  const to   = Math.min(grid.length - 1, ci + 3);
  const levels = [];
  for (let i = to; i >= from; i--) levels.push({ ...grid[i], idx: i });

  return levels.map(lv => {
    const isCurrent = lv.idx === ci;
    const isFilled  = lv.filled;
    const isAbove   = lv.buy > btc;
    const isBelow   = lv.buy < btc && !isCurrent;

    let bg, border, label, arrow, priceColor;
    if (isCurrent) {
      bg = '#001a30'; border = '#f7931a'; label = '◉ כאן'; arrow = ''; priceColor = '#f7931a';
    } else if (isFilled && !isAbove) {
      bg = '#001a0e'; border = '#00e676'; label = '✅ קנוי'; arrow = '↑ SELL'; priceColor = '#00e676';
    } else if (isAbove) {
      bg = '#0a1520'; border = '#555'; label = '⏳ ממתין'; arrow = '↓ BUY'; priceColor = '#8ab0c8';
    } else {
      bg = '#0a1520'; border = '#555'; label = '⏳ ממתין'; arrow = '↓ BUY'; priceColor = '#8ab0c8';
    }

    const dist = btc > 0 ? ((lv.buy - btc) / btc * 100).toFixed(2) : '0';
    const distColor = parseFloat(dist) > 0 ? '#8ab0c8' : '#00e676';

    return `<div style="flex-shrink:0;background:${bg};border:1px solid ${border};border-radius:6px;padding:5px 8px;text-align:center;min-width:80px;">
      <div style="font-size:.58rem;color:#aaaaaa;margin-bottom:2px;">${label}</div>
      <div style="font-size:.78rem;font-weight:700;color:${priceColor}">$${fmt(lv.buy,0)}</div>
      <div style="font-size:.52rem;color:#00e676;margin-top:1px;">→$${fmt(lv.sell,0)}</div>
      <div style="font-size:.52rem;color:${distColor};margin-top:1px;">${dist > 0 ? '+' : ''}${dist}%</div>
      <div style="font-size:.52rem;color:#ffd700;margin-top:1px;">+$${fmt(lv.profit,4)}</div>
    </div>`;
  }).join(`<div style="display:flex;align-items:center;color:#555;font-size:.8rem;padding:0 2px;">›</div>`);
}


// ── Activity log builder (Pionex-style with transaction table)
function buildLogHtml(tradeLog, filter){
  let entries=[...tradeLog].reverse();
  if(filter==='sell') entries=entries.filter(t=>t.type==='SELL');
  else if(filter==='buy') entries=entries.filter(t=>t.type==='BUY');
  entries=entries.slice(0,40);
  if(!entries.length) return `<div style="text-align:center;padding:16px;color:#cccccc;font-size:.7rem">⏳ ממתין לתנועת מחיר</div>`;

  // Show as transaction table for SELL entries, simple rows for BUY
  if(filter==='sell' || filter==='all'){
    const sells = entries.filter(t=>t.type==='SELL');
    const buys  = entries.filter(t=>t.type==='BUY');
    let html = '';

    if(sells.length){
      html += `<table style="width:100%;border-collapse:collapse;font-size:.58rem;margin-bottom:4px;">
        <thead><tr style="color:#aaaaaa;border-bottom:1px solid #0f2030;">
          <th style="padding:3px 4px;text-align:right">מחיר קנייה</th>
          <th style="padding:3px 4px;text-align:right">מחיר מכירה</th>
          <th style="padding:3px 4px;text-align:right">BTC</th>
          <th style="padding:3px 4px;text-align:right">רווח</th>
          <th style="padding:3px 4px;text-align:right">שעה</th>
        </tr></thead><tbody>`;
      sells.forEach(t=>{
        const sellPx = t.price||0;
        const buyPx  = sellPx - (t.profit||0)/(t.qty||0.00001) - sellPx*0.001;
        html += `<tr style="border-bottom:1px solid #09151f;">
          <td style="padding:2px 4px;color:#8ab0c8">$${fmt(buyPx,0)}</td>
          <td style="padding:2px 4px;color:#ffffff">$${fmt(sellPx,0)}</td>
          <td style="padding:2px 4px;color:#aaaaaa">${fmt(t.qty,5)}</td>
          <td style="padding:2px 4px;color:#00e676;font-weight:700">+$${fmt(t.profit,4)}</td>
          <td style="padding:2px 4px;color:#aaaaaa">${fmtT(t.time)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    }

    if(filter==='all' && buys.length){
      html += buys.slice(0,10).map(t=>`<div class="log-entry">
        <div class="log-icon">🟡</div>
        <div class="log-info">
          <div class="log-title" style="color:#ffd700">BUY ↓ — $${fmt(t.price,0)}</div>
          <div class="log-sub">${fmt(t.qty,6)} BTC</div>
        </div>
        <div class="log-right"><div class="log-time">${fmtT(t.time)}</div></div>
      </div>`).join('');
    }
    return html || `<div style="text-align:center;padding:16px;color:#cccccc;font-size:.7rem">⏳ ממתין לתנועת מחיר</div>`;
  }

  return entries.map(t=>{
    const isSell=t.type==='SELL';
    const icon=isSell?'🟢':'🟡';
    const titleColor=isSell?'#00e676':'#ffd700';
    const profitHtml=isSell?`<div class="log-profit">+$${fmt(t.profit,4)}</div>`:'';
    return `<div class="log-entry">
      <div class="log-icon">${icon}</div>
      <div class="log-info">
        <div class="log-title" style="color:${titleColor}">${isSell?'SELL ↑':'BUY ↓'} — $${fmt(t.price,0)}</div>
        <div class="log-sub">${fmt(t.qty,6)} BTC</div>
      </div>
      <div class="log-right">
        ${profitHtml}
        <div class="log-time">${fmtT(t.time)}</div>
      </div>
    </div>`;
  }).join('');
}

    document.getElementById('c-high').value=Math.round(s.upper);
    document.getElementById('c-grids').value=s.grids;
  }
  const p=botData['grid']?.raw;

function calcGrid(){
  const inv=parseFloat(document.getElementById('c-inv').value)||1000;
  const low=parseFloat(document.getElementById('c-low').value)||70000;
  const high=parseFloat(document.getElementById('c-high').value)||82000;
  const grids=parseInt(document.getElementById('c-grids').value)||50;
  if(high<=low||grids<2) return;

  const rangeSize=high-low;
  const stepPct=rangeSize/(grids*((low+high)/2))*100;
  const perLevel=inv/grids;
  const btcPerLevel=perLevel/((low+high)/2);
  const profitPerCycle=btcPerLevel*(rangeSize/grids)*0.9991; // minus 2×0.05% fee
  const cyclesPerDay=Math.max(0,(rangeSize/grids)/50*3); // rough estimate
  const dailyProfit=profitPerCycle*cyclesPerDay*grids*0.2; // conservative
  const apr=dailyProfit*365/inv*100;

  const el=document.getElementById('calc-results');
  el.innerHTML=[
    {l:'📏 צעד/רמה',v:`${fmt(stepPct,2)}%`},
    {l:'💵 הון/רמה',v:`$${fmt(perLevel,2)}`},
    {l:'₿ BTC/רמה',v:`${fmt(btcPerLevel,6)}`},
    {l:'💰 רווח/cycle',v:`$${fmt(profitPerCycle,4)}`},
    {l:'📅 רווח יומי (est)',v:`$${fmt(dailyProfit,3)}`},
    {l:'📈 APR (est)',v:`${fmt(apr,1)}%`},
  ].map(i=>`<div class="cr-item"><div class="cr-val">${i.v}</div><div class="cr-lbl">${i.l}</div></div>`).join('');
}

  if(chartWs){ try{ chartWs.close(); }catch(e){} }
  chartWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
  chartWs.onmessage = (evt)=>{
    try{
      const d = JSON.parse(evt.data);
      const btc = parseFloat(d.c);
      const el = document.querySelector('.btc-now');
      if(el && btc>0) el.textContent='$'+btc.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    }catch(e){}
  };
  chartWs.onclose = ()=>setTimeout(connectPriceWs, 3000);
  chartWs.onerror = ()=>chartWs.close();
}

async function buildLWChart(el){
  const rect=el.getBoundingClientRect();
  const w=rect.width||800, h=rect.height||400;

  lwChart=LightweightCharts.createChart(el,{
    width:w, height:h,
    layout:{ background:{type:'solid',color:'#070d14'}, textColor:'#ffffff' },
    grid:{ vertLines:{color:'transparent'}, horzLines:{color:'transparent'} },
    crosshair:{
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{ color:'#ffd700', labelBackgroundColor:'#ffd700' },
      horzLine:{ color:'#ffd700', labelBackgroundColor:'#ffd700' },
    },
    rightPriceScale:{ borderColor:'#0f2030', scaleMargins:{top:0.05,bottom:0.05} },
    timeScale:{ borderColor:'#0f2030', timeVisible:true, secondsVisible:false, rightOffset:5 },
  });

  new ResizeObserver(entries=>{
    for(const e of entries) lwChart && lwChart.resize(e.contentRect.width, e.contentRect.height);
  }).observe(el);

  candleSeries=lwChart.addCandlestickSeries({
    upColor:'#00e676', downColor:'#ff5252',
    borderUpColor:'#00e676', borderDownColor:'#ff5252',
    wickUpColor:'#00a050', wickDownColor:'#cc3030',
    lastValueVisible: false,
    priceLineVisible: false,
    priceFormat:{ type:'price', precision:2, minMove:0.01 },
  });
  // White label for current price on axis
  lwChart.applyOptions({
    rightPriceScale:{
      borderColor:'#0f2030',
      scaleMargins:{top:0.05,bottom:0.05},
    },
    layout:{
      background:{type:'solid',color:'#070d14'},
      textColor:'#ffffff',
    },
  });

  try{
    const res=await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=300');
    const data=await res.json();
    candleSeries.setData(data.map(k=>({
      time:  Math.floor(k[0]/1000),
      open:  parseFloat(k[1]),
      high:  parseFloat(k[2]),
      low:   parseFloat(k[3]),
      close: parseFloat(k[4]),
    })));
  }catch(e){ console.error('Binance fetch failed',e); }

  // ── Real-time WebSocket from Binance ──────────────────────────
  connectChartWs();

  // Invisible line series — gives us a pure white axis label for current price
  priceLabelSeries = lwChart.addLineSeries({
    color:                  'rgba(0,0,0,0)',
    lineWidth:              1,
    lastValueVisible:       true,
    priceLineVisible:       false,
    crosshairMarkerVisible: false,
  });

  drawGridLines();
}

function clearGridLines(){
  if(!candleSeries) return;
  priceLines.forEach(pl=>{ try{ candleSeries.removePriceLine(pl); }catch(e){} });
  priceLines=[];
}

function drawGridLines(){
  const s=botData['grid']?.state;
  if(!candleSeries||!s||!s.grid) return;

  clearGridLines();

  const btc=parseFloat(document.querySelector('.btc-now')?.textContent?.replace(/[$,]/g,'')||0);

  // Find the one current level where BTC is right now
  const currentLv = s.grid.find(lv => btc >= lv.buy && btc < lv.sell)
                 || s.grid.reduce((a,b) => Math.abs(b.buy-btc) < Math.abs(a.buy-btc) ? b : a);

  if(!currentLv) return;

  // Feed current price into the white-label series
  if(btc>0 && priceLabelSeries){
    const now = Math.floor(Date.now()/1000);
    priceLabelSeries.setData([{ time: now - 1, value: btc }, { time: now, value: btc }]);
  }

  // ONE green line — buy price
  priceLines.push(candleSeries.createPriceLine({
    price:            currentLv.buy,
    color:            '#00e67688',
    lineWidth:        1,
    lineStyle:        LightweightCharts.LineStyle.Dashed,
    axisLabelVisible: true,
    title:            '',
  }));

  // ONE red line — sell price
  priceLines.push(candleSeries.createPriceLine({
    price:            currentLv.sell,
    color:            '#ff525288',
    lineWidth:        1,
    lineStyle:        LightweightCharts.LineStyle.Dashed,
    axisLabelVisible: true,
    title:            '',
  }));
}

// ── Draw grid lines on overlay canvas ─────────────────────────
function drawOverlayGridLines() {
  const canvas = document.getElementById('grid-overlay');
  if (!canvas) return;
  const s = botData['grid']?.state;
  if (!s || !s.grid) return;

  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width  = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const btc = parseFloat(document.querySelector('.btc-now')?.textContent?.replace(/[$,]/g,'') || 0);
  if (!btc) return;

  // מחיר גבוה ונמוך נראה בגרף — נאמוד לפי ATR
  const atr   = s.atr14 || 1000;
  const upper = s.upper || (btc + atr * 3);
  const lower = s.lower || (btc - atr * 3);

  // הצג רק רמות שנמצאות בטווח הנראה
  const visibleLevels = s.grid.filter(lv => lv.buy >= lower * 0.98 && lv.buy <= upper * 1.02);

  const priceToY = (price) => {
    return H - ((price - lower) / (upper - lower)) * H;
  };

  visibleLevels.forEach(lv => {
    const isFilled = lv.filled;
    const isCurrent = btc >= lv.buy && btc < lv.sell;
    const buyY  = priceToY(lv.buy);
    const sellY = priceToY(lv.sell);

    // קו קנייה — לבן מואר
    ctx.beginPath();
    ctx.strokeStyle = isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff';
    ctx.lineWidth   = isCurrent ? 3 : 2;
    ctx.globalAlpha = 1.0;
    ctx.shadowColor = isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff';
    ctx.shadowBlur  = 8;
    ctx.setLineDash(isFilled ? [] : [6, 3]);
    ctx.moveTo(0, buyY);
    ctx.lineTo(W, buyY);
    ctx.stroke();

    // תווית מחיר קנייה
    ctx.shadowBlur = 0;
    ctx.setLineDash([]);
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = isFilled ? '#00ff88' : isCurrent ? '#ff9900' : '#ffffff';
    ctx.globalAlpha = 1.0;
    const label = isFilled ? `✅ BUY $${Math.round(lv.buy).toLocaleString()}` :
                  isCurrent ? `◉ $${Math.round(lv.buy).toLocaleString()}` :
                  `↓ BUY $${Math.round(lv.buy).toLocaleString()}`;
    ctx.fillText(label, 6, buyY - 3);

    // קו מכירה — אדום מואר
    if (isFilled) {
      ctx.beginPath();
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth   = 2;
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur  = 8;
      ctx.setLineDash([4, 4]);
      ctx.moveTo(0, sellY);
      ctx.lineTo(W, sellY);
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.setLineDash([]);
      ctx.fillStyle = '#ff4444';
      ctx.fillText(`↑ SELL $${Math.round(lv.sell).toLocaleString()}`, 6, sellY - 3);
    }
  });

  ctx.globalAlpha = 1.0;
  ctx.shadowBlur  = 0;
}
