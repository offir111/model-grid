<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Model GRID — Pionex AI Grid Bot 2.0</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100vh;
      overflow: hidden;
      background: #070d14;
      color: #dce8f0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ── LAYOUT ── */
    .root {
      display: grid;
      grid-template-rows: 54px 1fr;
      grid-template-columns: 1fr 320px;
      height: 100vh;
      gap: 0;
    }

    /* ── HEADER ── */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #0a1520;
      border-bottom: 1px solid #152535;
    }
    .header-title { font-size:1.1rem; font-weight:700; color:#00d4ff; letter-spacing:1px; }
    .header-sub   { font-size:0.72rem; color:#3a5a7a; margin-top:1px; }
    .btc-now      { font-size:1.5rem; font-weight:800; color:#f7931a; }
    .refresh-txt  { font-size:0.7rem; color:#3a5a7a; text-align:left; margin-top:1px; }
    .header-mid   { display:flex; gap:28px; }
    .hm-item      { text-align:center; }
    .hm-val       { font-size:1rem; font-weight:700; }
    .hm-lbl       { font-size:0.65rem; color:#3a5a7a; margin-top:1px; }

    /* ── LEFT PANEL ── */
    .left {
      grid-column: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px 10px 16px;
      overflow: hidden;
    }

    /* stat rows */
    .row4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .row5 { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }

    .card {
      background: #0d1820;
      border: 1px solid #152535;
      border-radius: 9px;
      padding: 10px 12px;
    }
    .card-lbl { font-size:0.65rem; color:#3a5a7a; text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
    .card-val { font-size:1.25rem; font-weight:700; }
    .card-sub { font-size:0.65rem; color:#2a4a6a; margin-top:3px; }
    .green  { color:#00e676; }
    .blue   { color:#00d4ff; }
    .orange { color:#f7931a; }
    .gray   { color:#7a9ab0; }

    /* grid viz */
    .grid-viz {
      background: #0d1820;
      border: 1px solid #152535;
      border-radius: 9px;
      padding: 10px 14px;
    }
    .viz-title { font-size:0.65rem; color:#3a5a7a; text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
    .range-labels { display:flex; justify-content:space-between; font-size:0.68rem; color:#3a5a7a; margin-bottom:5px; }
    .range-bar {
      position:relative; height:20px;
      background:#0a1520; border-radius:10px;
      border:1px solid #152535; overflow:visible;
      margin-bottom:10px;
    }
    .range-fill {
      height:100%; background:linear-gradient(90deg,#003a5a,#005a8a);
      border-radius:10px 0 0 10px;
    }
    .price-pin {
      position:absolute; top:-5px;
      width:3px; height:30px;
      background:#f7931a; border-radius:2px;
      transform:translateX(-50%);
      box-shadow:0 0 8px #f7931a88;
    }
    .pin-lbl {
      position:absolute; top:-18px; left:50%;
      transform:translateX(-50%);
      font-size:0.65rem; color:#f7931a;
      white-space:nowrap; font-weight:700;
    }
    .grid-mini { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
    .gm { background:#0a1520; border-radius:7px; padding:7px 8px; text-align:center; border:1px solid #122030; }
    .gm-v { font-size:1rem; font-weight:700; color:#00d4ff; }
    .gm-l { font-size:0.6rem; color:#2a4a6a; margin-top:2px; }

    /* fills */
    .fills-wrap {
      background: #0d1820;
      border: 1px solid #152535;
      border-radius: 9px;
      padding: 8px 12px;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .fills-title { font-size:0.65rem; color:#3a5a7a; text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
    .fills-table { flex:1; overflow-y:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.78rem; }
    thead th { color:#2a4a6a; font-size:0.62rem; text-transform:uppercase; padding:4px 8px; border-bottom:1px solid #122030; text-align:right; }
    tbody tr { border-bottom:1px solid #0c1820; }
    tbody td { padding:5px 8px; }
    .badge-sell { background:#003a20; color:#00e676; padding:2px 8px; border-radius:10px; font-size:0.72rem; font-weight:700; }
    .pp { color:#00e676; font-weight:600; }

    /* ── RIGHT PANEL — GRID LEVELS ── */
    .right {
      grid-column: 2;
      background: #0a1118;
      border-right: 1px solid #152535;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .right-title {
      padding: 10px 14px 8px;
      font-size: 0.7rem;
      color: #3a5a7a;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #122030;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .legend { display:flex; gap:10px; font-size:0.6rem; }
    .leg { display:flex; align-items:center; gap:4px; }
    .dot-green  { width:7px;height:7px;background:#00e676;border-radius:50%; }
    .dot-orange { width:7px;height:7px;background:#f7931a;border-radius:50%; }
    .dot-gray   { width:7px;height:7px;background:#2a4060;border-radius:50%; }

    .levels-scroll { flex:1; overflow-y:auto; }
    .lvl-table { width:100%; border-collapse:collapse; font-size:0.75rem; }
    .lvl-table thead th {
      position:sticky; top:0;
      background:#0a1118; z-index:1;
      color:#2a4a6a; font-size:0.6rem;
      text-transform:uppercase;
      padding:5px 8px;
      border-bottom:1px solid #122030;
      text-align:right;
    }
    .lvl-table tbody tr { border-bottom:1px solid #0c1520; }
    .lvl-table tbody td { padding:4px 8px; }
    .lvl-filled  { background:#001a10; }
    .lvl-current { background:#1a0e00; }

    /* status */
    .status {
      grid-column: 1 / -1;
      background: #091018;
      border-top: 1px solid #122030;
      padding: 4px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #2a4a6a;
      flex-shrink: 0;
    }
    .dot-live { width:6px;height:6px;background:#00e676;border-radius:50%;display:inline-block;margin-left:5px;animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#070d14; }
    ::-webkit-scrollbar-thumb { background:#1a2f45; border-radius:2px; }
  </style>
</head>
<body>
<div class="root" id="root">
  <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;color:#3a5a7a;font-size:1rem">
    טוען...
  </div>
</div>

<script>
const P_URL = 'https://raw.githubusercontent.com/offir111/model-grid/master/data/portfolio.json';
const S_URL = 'https://raw.githubusercontent.com/offir111/model-grid/master/data/grid_state.json';
const B_URL = 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';

let countdown = 60, timer;

const fmt  = (n,d=2) => n==null||isNaN(n)?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD = iso => { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('he-IL')+' '+d.toTimeString().slice(0,5); };
const days = iso => Math.max(0.001,(Date.now()-new Date(iso).getTime())/86400000);

async function load() {
  const [pr,sr,br] = await Promise.all([
    fetch(P_URL+'?t='+Date.now()), fetch(S_URL+'?t='+Date.now()), fetch(B_URL)
  ]);
  const p  = await pr.json();
  const s  = sr.ok ? await sr.json() : null;
  const bt = parseFloat((await br.json()).price||0);
  render(p,s,bt);
}

function render(p,s,btc) {
  const inv   = p.investment||0, pnl=p.realized_pnl||0;
  const total = inv+pnl, apr=p.apr||0, cycles=p.total_cycles||0;
  const dgt   = p.dgt_count||0, mdd=p.max_drawdown||0;
  const d     = days(p.start_time);
  const pnlPct= inv>0?pnl/inv*100:0;

  const lower = s?s.lower:0, upper=s?s.upper:0, grids=s?s.grids:0, atr=s?s.atr14:0;
  const filled= s?s.grid.filter(l=>l.filled).length:0, waiting=grids-filled;
  const inPct = upper>lower&&btc>0?Math.max(0,Math.min(100,(btc-lower)/(upper-lower)*100)):0;
  const mid   = s&&s.grid?s.grid[Math.floor(grids/2)]:null;
  const ppc   = mid?mid.profit:0;
  const perG  = grids>0?inv/grids:0;
  const dcyc  = d>0?cycles/d:0;

  const log   = (p.trade_log||[]).filter(t=>t.type==='SELL').slice(-8).reverse();

  const pc = pnl>=0?'green':'red';
  const ac = apr>=0?'green':'red';

  // grid levels HTML
  const lvlRows = s&&s.grid ? [...s.grid].reverse().map((lv,i)=>{
    const idx = grids-i;
    const isFilled = lv.filled;
    const isHere   = !lv.filled && btc>=lv.buy && btc<lv.sell;
    let cls='', badge='';
    if(isFilled){ cls='lvl-filled'; badge=`<span style="color:#00e676;font-weight:700">✅ קנוי</span>`; }
    else if(isHere){ cls='lvl-current'; badge=`<span style="color:#f7931a;font-weight:700">← כאן</span>`; }
    else badge=`<span style="color:#2a4060">⏳</span>`;
    return `<tr class="${cls}">
      <td style="color:#2a4060;text-align:center">${idx}</td>
      <td style="font-weight:600;color:#9ab8d0">$${fmt(lv.buy,0)}</td>
      <td style="color:#3a5a7a">$${fmt(lv.sell,0)}</td>
      <td style="color:#00e676;font-size:0.7rem">+$${fmt(lv.profit,4)}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="5" style="color:#2a4060;padding:20px;text-align:center">טוען רמות...</td></tr>';

  document.getElementById('root').innerHTML = `

    <!-- HEADER -->
    <div class="header">
      <div>
        <div class="header-title">⚡ MODEL GRID</div>
        <div class="header-sub">Pionex AI Grid Bot 2.0 | BTC/USDT | סימולציה</div>
      </div>
      <div class="header-mid">
        <div class="hm-item">
          <div class="hm-val blue">$${fmt(total)}</div>
          <div class="hm-lbl">שווי כולל</div>
        </div>
        <div class="hm-item">
          <div class="hm-val ${pc}">${pnl>=0?'+':''}$${fmt(pnl,4)}</div>
          <div class="hm-lbl">רווח מצטבר</div>
        </div>
        <div class="hm-item">
          <div class="hm-val ${ac}">${fmt(apr,1)}%</div>
          <div class="hm-lbl">APR שנתי</div>
        </div>
        <div class="hm-item">
          <div class="hm-val orange">${cycles}</div>
          <div class="hm-lbl">סייקלים</div>
        </div>
        <div class="hm-item">
          <div class="hm-val" style="color:#7a9ab0">${fmt(d,1)}</div>
          <div class="hm-lbl">ימי פעילות</div>
        </div>
      </div>
      <div>
        <div class="btc-now">$${fmt(btc)}</div>
        <div class="refresh-txt" id="ref">BTC מחיר עכשיו | מתרענן בעוד ${countdown}ש׳</div>
      </div>
    </div>

    <!-- LEFT -->
    <div class="left">

      <!-- row 1 -->
      <div class="row4">
        <div class="card">
          <div class="card-lbl">💰 השקעה</div>
          <div class="card-val gray">$${fmt(inv)}</div>
          <div class="card-sub">התחלה: $${fmt(p.starting_investment||inv)}</div>
        </div>
        <div class="card">
          <div class="card-lbl">📈 רווח יומי</div>
          <div class="card-val green">~$${fmt(dcyc*ppc,4)}</div>
          <div class="card-sub">${fmt(dcyc,1)} cycles/יום × $${fmt(ppc,4)}</div>
        </div>
        <div class="card">
          <div class="card-lbl">📉 MDD</div>
          <div class="card-val" style="color:${mdd>10?'#ff5252':'#7a9ab0'}">${fmt(mdd,2)}%</div>
          <div class="card-sub">ירידה מקסימלית</div>
        </div>
        <div class="card">
          <div class="card-lbl">🔁 DGT איפוסים</div>
          <div class="card-val gray">${dgt}</div>
          <div class="card-sub">טווח אוטומטי</div>
        </div>
      </div>

      <!-- GRID VIZ -->
      <div class="grid-viz">
        <div class="viz-title">📐 מצב הגריד</div>
        <div class="range-labels">
          <span>$${fmt(lower,0)}</span>
          <span style="color:#f7931a;font-weight:600">BTC $${fmt(btc,0)} — ${fmt(inPct,0)}% בטווח</span>
          <span>$${fmt(upper,0)}</span>
        </div>
        <div class="range-bar">
          <div class="range-fill" style="width:${inPct}%"></div>
          <div class="price-pin" style="left:${inPct}%">
            <div class="pin-lbl">$${fmt(btc,0)}</div>
          </div>
        </div>
        <div class="grid-mini">
          <div class="gm"><div class="gm-v">${grids}</div><div class="gm-l">סה"כ רמות</div></div>
          <div class="gm"><div class="gm-v" style="color:#00e676">${filled}</div><div class="gm-l">קנויות</div></div>
          <div class="gm"><div class="gm-v" style="color:#3a5a7a">${waiting}</div><div class="gm-l">ממתינות</div></div>
          <div class="gm"><div class="gm-v" style="color:#f7931a">$${fmt(atr,0)}</div><div class="gm-l">ATR-14</div></div>
        </div>
      </div>

      <!-- FILLS -->
      <div class="fills-wrap">
        <div class="fills-title">📋 עסקאות אחרונות (SELL)</div>
        <div class="fills-table">
          ${log.length===0
            ? `<div style="text-align:center;padding:16px;color:#2a4060;font-size:0.82rem">⏳ אין עסקאות עדיין — הגריד ממתין לתנועת מחיר</div>`
            : `<table>
                <thead><tr>
                  <th>סוג</th><th>מחיר</th><th>BTC</th><th>רווח</th><th>זמן</th>
                </tr></thead>
                <tbody>${log.map(t=>`
                  <tr>
                    <td><span class="badge-sell">SELL</span></td>
                    <td style="font-weight:600">$${fmt(t.price,0)}</td>
                    <td style="color:#3a5a7a">${t.qty?fmt(t.qty,5):'—'}</td>
                    <td class="pp">+$${fmt(t.profit,4)}</td>
                    <td style="color:#2a4060">${fmtD(t.time)}</td>
                  </tr>`).join('')}
                </tbody>
               </table>`
          }
        </div>
      </div>
    </div>

    <!-- RIGHT — GRID LEVELS -->
    <div class="right">
      <div class="right-title">
        <span>📊 כל ${grids} רמות הגריד</span>
        <div class="legend">
          <div class="leg"><div class="dot-green"></div><span>קנוי</span></div>
          <div class="leg"><div class="dot-orange"></div><span>מחיר כאן</span></div>
          <div class="leg"><div class="dot-gray"></div><span>ממתין</span></div>
        </div>
      </div>
      <div class="levels-scroll">
        <table class="lvl-table">
          <thead><tr>
            <th style="width:32px">#</th>
            <th>קנייה</th>
            <th>מכירה</th>
            <th>רווח</th>
            <th>סטטוס</th>
          </tr></thead>
          <tbody>${lvlRows}</tbody>
        </table>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status">
      <div><span class="dot-live"></span> פעיל — GitHub Actions כל 15 דקות</div>
      <div>עדכון אחרון: ${fmtD(p.last_updated)}</div>
      <div>$${fmt(perG,2)} לרמה | ~$${fmt(ppc,5)} רווח/cycle</div>
      <div>התחלה: ${fmtD(p.start_time)}</div>
    </div>
  `;

  startCountdown();
}

function startCountdown(){
  clearInterval(timer); countdown=60;
  timer=setInterval(()=>{
    countdown--;
    const el=document.getElementById('ref');
    if(el) el.textContent=`BTC מחיר עכשיו | מתרענן בעוד ${countdown}ש׳`;
    if(countdown<=0){ clearInterval(timer); load(); }
  },1000);
}

load();
</script>
</body>
</html>
